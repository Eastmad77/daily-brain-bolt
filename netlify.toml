# Netlify config for The Daily BrainBolt (static site)

[build]
  # No build step needed, just publish the root
  command = ""
  publish = "."

# ---------- Headers ----------
# Cache icons aggressively (1 year)
[[headers]]
  for = "/icon-*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/apple-touch-icon.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Manifest (shorter cache so updates propagate quickly)
[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Service worker (don’t cache forever so updates arrive)
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Social preview images
[[headers]]
  for = "/og-image-*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/og-image-*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Ensure .well-known JSON (for Android TWA verification) is served correctly
[[headers]]
  for = "/.well-known/*"
  [headers.values]
    Content-Type = "application/json; charset=utf-8"
    Cache-Control = "public, max-age=3600"

# ---------- Redirects ----------
# Pass through .well-known files
[[redirects]]
  from = "/.well-known/*"
  to   = "/.well-known/:splat"
  status = 200

# If you ever add client-side routing, uncomment this fallback:
# [[redirects]]
#   from = "/*"
#   to   = "/index.html"
#   status = 200
