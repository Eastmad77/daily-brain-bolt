# =========================
# Netlify config for BrainBolt
# Place this file at your repo root
# =========================

[build]
  # If you have no build step, you can omit "command".
  # If you DO build assets (e.g., export PNGs), keep your command here.
  # command = "npm run build"
  publish = "."

[build.environment]
  NODE_VERSION = "18"

# ---------- Caching: long-lived (immutable) ----------
# Icons and manifest rarely change; version file names when you do.
[[headers]]
  for = "/icon-*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/apple-touch-icon.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/app-icon.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/header-graphic.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "application/manifest+json; charset=utf-8"

# ---------- Caching: do NOT cache service workers ----------
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0"

[[headers]]
  for = "/firebase-messaging-sw.js"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0"

# ---------- Well-known (Digital Asset Links / others) ----------
[[headers]]
  for = "/.well-known/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/json; charset=utf-8"

# ---------- Security Headers ----------
# Tweak as needed if you embed cross-site iframes, etc.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=(), accelerometer=(), gyroscope=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

# ---------- 404 handling ----------
# Netlify will automatically serve /404.html for missing routes.
# No redirect needed for a static multi-page site.
# If you ever convert to a single-page app router, use this instead:
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200
