# netlify.toml
# Clean deployment config for BrainBolt app

[build]
  # No build step (pure static site)
  command = ""
  # Publish from repo root (where index.html is)
  publish = "."

[build.environment]
  NODE_VERSION = "18"

# Long-term cache for icons
[[headers]]
  for = "/icon-*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/apple-touch-icon.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Prevent old service workers from getting stuck
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache"
