<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Menu • The Daily BrainBolt</title>

  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#0E1E27">

  <link rel="stylesheet" href="/style.css">
  <style>
    .menu-page {
      display:flex;flex-direction:column;align-items:center;gap:1rem;padding:2rem 1rem;
    }
    .menu-title { text-align:center; }
    .menu-title img { width:90px;height:90px;margin-bottom:.5rem }
    .menu-card {
      background: var(--bg-light);
      border: 2px solid var(--accent-blue);
      border-radius: 16px;
      padding: 1rem 2rem;
      text-align: center;
      font-size: 1.1rem;
      width: 100%;
      max-width: 340px;
      transition: background .2s, transform .15s, color .2s, border-color .2s;
      cursor: pointer;
      text-decoration: none;
      color: var(--accent-orange);
    }
    .menu-card:hover {
      background: var(--accent-blue);
      color: #111;
      transform: translateY(-2px);
      border-color: var(--accent-blue);
      text-decoration: none;
    }
    .menu-grid { display:grid; gap:1rem; width:100%; max-width:360px }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/index.html" class="menu-btn" aria-label="Back to Home">←</a>
  </div>

  <header class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-inner menu-title">
      <img src="/app-icon.svg" alt="BrainBolt Icon" class="app-icon-large" onerror="this.style.display='none'">
      <h1>Menu</h1>
    </div>
  </header>

  <main class="container">
    <div class="menu-page">
      <div class="menu-grid">
        <a class="menu-card" href="/index.html">🏠 Home</a>
        <a class="menu-card" href="/about.html">ℹ️ About</a>
        <a class="menu-card" href="/terms.html">📜 Terms</a>
        <a class="menu-card" href="/privacy.html">🔒 Privacy</a>
        <a class="menu-card" href="/contact.html">✉️ Contact</a>
        <button class="menu-card" id="btnSignIn">🔑 Sign in with Google</button>
        <button class="menu-card" id="btnNotify">🔔 Enable Notifications</button>
      </div>
    </div>
  </main>

  <footer class="footer">
    © 2025 The Daily BrainBolt •
    <a href="/about.html">About</a> •
    <a href="/terms.html">Terms</a> •
    <a href="/privacy.html">Privacy</a> •
    <a href="/contact.html">Contact</a>
  </footer>

  <!-- Firebase + App (reuse sign-in / notify handlers if any) -->
  <script src="/firebase-config.js"></script>
  <script src="/app.js"></script>
</body>
</html>
