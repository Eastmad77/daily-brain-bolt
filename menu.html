<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Menu • BrainBolt</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#162022" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="topbar">
    <button id="mmMenuBtn" class="menu-btn" aria-label="Open menu" title="Menu">☰</button>
    <div class="topbar-right">
      <a class="btn outline small" href="/index.html">Home</a>
    </div>
  </div>

  <nav id="mmSideMenu" class="side-menu" aria-hidden="true">
    <ul>
      <li><a href="/index.html">Home</a></li>
      <li><a href="/pro.html" class="menu-pro">Go Pro</a></li>
      <li><a href="/about.html">About</a></li>
      <li><a href="/terms.html">Terms</a></li>
      <li><a href="/privacy.html">Privacy</a></li>
      <li><a href="/contact.html">Contact</a></li>
      <li><button id="btnSignIn" class="btn outline full">Sign in with Google</button></li>
      <li><button id="btnNotify" class="btn ghost full">Enable Notifications</button></li>
    </ul>
  </nav>

  <header class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-inner">
      <div class="hero-title">
        <img src="/app-icon.svg" alt="BrainBolt Icon" class="app-icon-large" />
        <h1><img class="favicon-inline" src="/favicon.svg" alt="">Menu</h1>
      </div>
      <p class="subtitle">Quick access to everything</p>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <div class="options" style="grid-template-columns:1fr 1fr;">
        <a class="btn outline" href="/about.html">About</a>
        <a class="btn outline" href="/terms.html">Terms</a>
        <a class="btn outline" href="/privacy.html">Privacy</a>
        <a class="btn outline" href="/contact.html">Contact</a>
        <a class="btn shuffle" href="/pro.html">Go Pro</a>
        <a class="btn outline" href="/admin.html">Admin</a>
      </div>
      <div class="cta-row" style="margin-top:14px;">
        <button id="btnSignIn2" class="btn outline">Sign in with Google</button>
        <button id="btnNotify2" class="btn ghost">Enable Notifications</button>
      </div>
    </section>
  </main>

  <footer class="footer">
    © 2025 BrainBolt •
    <a class="footer-link" href="/about.html">About</a> •
    <a class="footer-link" href="/terms.html">Terms</a> •
    <a class="footer-link" href="/privacy.html">Privacy</a> •
    <a class="footer-link" href="/contact.html">Contact</a> •
    <a class="footer-mail" href="mailto:support@dailybrainbolt.com">support@dailybrainbolt.com</a>
  </footer>

  <script src="/firebase-config.js"></script>
  <script src="/app.js"></script>
  <script>
    // Mirror the main menu auto-hide behavior when opened
    const m = document.getElementById('mmMenuBtn');
    const s = document.getElementById('mmSideMenu');
    let t = null;
    m?.addEventListener('click', ()=>{
      s?.classList.add('open'); s?.setAttribute('aria-hidden','false');
      if (t) clearTimeout(t);
      t = setTimeout(()=>{ s?.classList.remove('open'); s?.setAttribute('aria-hidden','true'); }, 5000);
    });

    // Duplicate sign-in/notify (re-use handlers in app.js via same IDs)
    document.getElementById('btnSignIn2')?.addEventListener('click', ()=> {
      document.getElementById('btnSignIn')?.click();
    });
    document.getElementById('btnNotify2')?.addEventListener('click', ()=> {
      document.getElementById('btnNotify')?.click();
    });
  </script>
</body>
</html>
