<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>About • BrainBolt</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" sizes="192x192" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#162022">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="copy">
  <div class="topbar">
    <button id="mmMenuBtn" class="menu-btn" aria-label="Open menu">☰</button>
    <button id="muteBtn" class="mute-btn" aria-label="Sound on/off">🔊</button>
  </div>
  <nav id="mmSideMenu" class="side-menu" aria-hidden="true">
    <ul>
      <li><a href="/index.html">Home</a></li>
      <li><a href="/menu.html">Menu</a></li>
      <li><a href="/about.html">About</a></li>
      <li><a href="/terms.html">Terms</a></li>
      <li><a href="/privacy.html">Privacy</a></li>
      <li><a href="/contact.html">Contact</a></li>
      <li><a href="/pro.html" class="pro-link">Go Pro 🚀</a></li>
      <li><button id="themeToggle" class="btn outline" type="button">Toggle Light/Dark</button></li>
    </ul>
  </nav>

  <header class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-inner">
      <div class="hero-title">
        <img src="/app-icon.svg" alt="BrainBolt Icon" class="app-icon-large">
        <h1>About</h1>
      </div>
      <p class="subtitle">Daily sparks. Sharper minds.</p>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <p><strong>BrainBolt</strong> delivers 12 fresh questions each day across trivia, language, and logic. Keep a streak, beat your time, come back tomorrow.</p>
    </section>
  </main>

  <footer class="footer">© 2025 BrainBolt •
    <a href="/about.html">About</a> • <a href="/terms.html">Terms</a> •
    <a href="/privacy.html">Privacy</a> • <a href="/contact.html">Contact</a>
  </footer>

  <script>
    (function initMenu(){
      const btn=document.getElementById('mmMenuBtn');
      const panel=document.getElementById('mmSideMenu');
      let hideTimer=null;
      const close=()=>{panel.classList.remove('open');panel.setAttribute('aria-hidden','true');clearTimeout(hideTimer);};
      const open =()=>{panel.classList.add('open');panel.setAttribute('aria-hidden','false');restartAutoHide();};
      function restartAutoHide(){clearTimeout(hideTimer);hideTimer=setTimeout(close,5000);}
      btn?.addEventListener('click',open);
      panel.addEventListener('mouseenter',()=>clearTimeout(hideTimer));
      panel.addEventListener('mouseleave',()=>{restartAutoHide();});
      panel.querySelectorAll('a,button').forEach(el=>el.addEventListener('click',close));
      document.addEventListener('keydown',e=>{if(e.key==='Escape')close();});
    })();
  </script>
</body>
</html>
