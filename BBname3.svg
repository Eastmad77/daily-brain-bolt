<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#F3FEFD"/>
      <stop offset="100%" stop-color="#E8FBFA"/>
    </linearGradient>
    <radialGradient id="cyanAuraL" cx="18%" cy="12%" r="60%">
      <stop offset="0%"  stop-color="#38FFF9" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#38FFF9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="amberAuraL" cx="85%" cy="20%" r="55%">
      <stop offset="0%"  stop-color="#FFB400" stop-opacity=".14"/>
      <stop offset="100%" stop-color="#FFB400" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="boltFillL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#FFCF4F"/>
      <stop offset="100%" stop-color="#FFB400"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgL)"/>
  <ellipse cx="220" cy="140" rx="520" ry="360" fill="url(#cyanAuraL)"/>
  <ellipse cx="980" cy="170" rx="500" ry="320" fill="url(#amberAuraL)"/>

  <g fill="#082428">
    <text x="80" y="290" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="72" font-weight="800" letter-spacing=".5">
      The Daily Brain Bolt
    </text>
    <rect x="80" y="310" width="420" height="6" rx="3" fill="#FFB400"/>
    <text x="80" y="380" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="32" font-weight="600" fill="#205B63">
      Shock your synapses. Keep the streak alive.
    </text>
  </g>

  <g transform="translate(760,120) scale(1.25)">
    <path d="M140 0 L60 120 L120 120 L80 240 L180 110 L120 110 Z"
          fill="url(#boltFillL)" stroke="#FFCB47" stroke-width="8"
          style="filter: drop-shadow(0 18px 28px rgba(255,180,0,.24)) drop-shadow(0 26px 48px rgba(56,255,249,.18));"/>
  </g>

  <!-- subtle border for light feeds -->
  <rect x="12" y="12" width="1176" height="606" rx="20" fill="none" stroke="#DAF7F5" stroke-width="4"/>
</svg>
