<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="boltFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE172"/>
      <stop offset="100%" stop-color="#FFB400"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="45%" stop-color="#7CFFF7" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#38FFF9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="110" fill="#0B1C21"/>

  <!-- Cyan aura -->
  <circle cx="256" cy="256" r="220" fill="url(#glow)"/>

  <!-- Lightning bolt -->
  <path d="M300 100 L200 260 L270 260 L230 412 L360 230 L280 230 Z"
        fill="url(#boltFill)" stroke="#FFCB47" stroke-width="12"
        style="filter: drop-shadow(0 8px 14px rgba(255,180,0,.35))
                        drop-shadow(0 18px 28px rgba(56,255,249,.25));"/>
</svg>
