.hero {
  /* ... */
  background:
    radial-gradient(800px 400px at 15% 10%, rgba(74,201,255,0.18), rgba(74,201,255,0) 60%),
    radial-gradient(900px 500px at 85% 0%, rgba(255,140,0,0.12), rgba(255,140,0,0) 60%),
    linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%),
    url('/header-graphic.svg'); /* <- here */
  background-repeat: no-repeat;
  background-position: top right;
  background-size: 40%;
}
