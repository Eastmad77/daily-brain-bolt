<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact • The Daily BrainBolt</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="hero small">
    <div class="hero-inner">
      <div class="hero-topbar">
        <button id="menuBtn" class="menu-btn" aria-label="Open menu">☰</button>
      </div>
      <div class="hero-title">
        <img src="/icon-192.png" alt="BrainBolt Icon" class="app-icon">
        <h1>Contact</h1>
      </div>
      <p class="subtitle">Get in touch with us</p>
    </div>
  </header>

  <nav id="sideMenu" class="side-menu" aria-hidden="true">
    <button id="closeMenu" class="close-btn" aria-label="Close menu">✕</button>
    <ul>
      <li><a href="/index.html">Home</a></li>
      <li><a href="/about.html">About</a></li>
      <li><a href="/terms.html">Terms</a></li>
      <li><a href="/privacy.html">Privacy</a></li>
      <li><a href="#" id="menuSignIn">Sign In</a></li>
      <li><a href="#" id="menuNotify">Enable Notifications</a></li>
    </ul>
  </nav>

  <main class="container">
    <section class="card">
      <p>Have feedback, questions, or ideas for new features?</p>
      <ul>
        <li>Email: <a href="mailto:support@dailybrainbolt.com">support@dailybrainbolt.com</a></li>
      </ul>
    </section>
  </main>

  <footer class="footer">
    © 2025 The Daily BrainBolt •
    <a href="/index.html">Home</a> •
    <a href="/terms.html">Terms</a> •
    <a href="/privacy.html">Privacy</a> •
    <a href="/about.html">About</a>
  </footer>

  <script>
    const menuBtn = document.getElementById('menuBtn');
    const sideMenu = document.getElementById('sideMenu');
    const closeMenu = document.getElementById('closeMenu');
    function openMenu(){ sideMenu.classList.add('open'); sideMenu.setAttribute('aria-hidden','false'); }
    function closeMenuFn(){ sideMenu.classList.remove('open'); sideMenu.setAttribute('aria-hidden','true'); }
    menuBtn.addEventListener('click', openMenu);
    closeMenu.addEventListener('click', closeMenuFn);
    document.addEventListener('keydown', (e)=>{ if(e.key==='Escape') closeMenuFn(); });

    const menuSignIn = document.getElementById('menuSignIn');
    const menuNotify = document.getElementById('menuNotify');
    menuSignIn.addEventListener('click', (e)=>{ e.preventDefault(); if (window.signInWithGoogle) window.signInWithGoogle(); else window.location.href='/'; });
    menuNotify.addEventListener('click', (e)=>{ e.preventDefault(); if (window.requestNotify) window.requestNotify(); else window.location.href='/'; });
  </script>
</body>
</html>
