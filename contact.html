<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact • BrainBolt</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" sizes="192x192" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#162022">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="copy">
  <div class="topbar">
    <button id="mmMenuBtn" class="menu-btn" aria-label="Open menu">☰</button>
    <button id="muteBtn" class="mute-btn" aria-label="Sound on/off">🔊</button>
  </div>
  <nav id="mmSideMenu" class="side-menu" aria-hidden="true">
    <ul>
      <li><a href="/index.html">Home</a></li>
      <li><a href="/menu.html">Menu</a></li>
      <li><a href="/about.html">About</a></li>
      <li><a href="/terms.html">Terms</a></li>
      <li><a href="/privacy.html">Privacy</a></li>
      <li><a href="/contact.html">Contact</a></li>
      <li><a href="/pro.html" class="pro-link">Go Pro 🚀</a></li>
      <li><button id="themeToggle" class="btn outline" type="button">Toggle Light/Dark</button></li>
    </ul>
  </nav>

  <header class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-inner">
      <div class="hero-title">
        <img src="/app-icon.svg" alt="BrainBolt Icon" class="app-icon-large">
        <h1>Contact</h1>
      </div>
      <p class="subtitle">We’d love to hear from you.</p>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <p>Email us at <a class="accent-link" href="mailto:support@dailybrainbolt.com">support@dailybrainbolt.com</a>.</p>
      <p>Read our <a class="accent-link" href="/privacy.html">Privacy Policy</a>.</p>
    </section>
  </main>

  <footer class="footer">© 2025 BrainBolt •
    <a href="/about.html">About</a> • <a href="/terms.html">Terms</a> •
    <a href="/privacy.html">Privacy</a> • <a href="/contact.html">Contact</a>
  </footer>

  <script>(function(){const b=mmMenuBtn,p=mmSideMenu;let t=null;const c=()=>{p.classList.remove('open');p.setAttribute('aria-hidden','true');clearTimeout(t)};const o=()=>{p.classList.add('open');p.setAttribute('aria-hidden','false');clearTimeout(t);t=setTimeout(c,5000)};b?.addEventListener('click',o);p.addEventListener('mouseenter',()=>clearTimeout(t));p.addEventListener('mouseleave',()=>{clearTimeout(t);t=setTimeout(c,5000)});p.querySelectorAll('a,button').forEach(e=>e.addEventListener('click',c));document.addEventListener('keydown',e=>{if(e.key==='Escape')c();});})();</script>
</body>
</html>
