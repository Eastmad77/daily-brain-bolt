<!DOCTYPE html>

<head>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/style.css" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#0D2430" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- Social -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://dailybrainbolt.com/contact.html" />
  <meta property="og:title" content="⚡ Contact — The Daily BrainBolt" />
  <meta property="og:description" content="Contact The Daily BrainBolt." />
  <meta property="og:image" content="https://dailybrainbolt.com/og-image-dark.png" />

</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <img class="brand-mark" src="/app-icon.svg" alt="BrainBolt icon" />
      <h1 class="brand-title">Contact</h1>
      <p class="subtitle">We read every message!</p>
      <div class="cta-row">
        <a class="btn primary" href="/">Back to quiz</a>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Email</h2>
      <p>General: <a href="mailto:info@dailybrainbolt.com">info@dailybrainbolt.com</a></p>
      <p>Privacy: <a href="mailto:privacy@dailybrainbolt.com">privacy@dailybrainbolt.com</a></p>

      <h2>Feedback</h2>
      <p>Got a great question we should add? Spotted a mistake? We’d love to hear it.</p>
      <p><a class="btn outline" href="mailto:info@dailybrainbolt.com?subject=BrainBolt%20Feedback">Send feedback</a></p>
    </section>

    <!-- Optional ad placement -->
    <section class="card ad-card" style="display:none;">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="YOUR-ADSENSE-ID"
           data-ad-slot="YOUR-AD-SLOT-ID"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </section>
  </main>

  <footer class="footer">
    <div class="foot-inner">
      <div>© <span id="year"></span> The Daily BrainBolt</div>
      <nav class="foot-nav">
        <a href="/about.html">About</a>
        <a href="/terms.html">Terms</a>
        <a href="/privacy.html">Privacy</a>
        <a href="/contact.html">Contact</a>
      </nav>
    </div>
  </footer>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js').catch(()=>{});
      });
    }
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
