<!-- /public/og-image.svg (export PNG 1200x630 as /public/og-image.png) -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#061114"/>
      <stop offset="45%" stop-color="#0B1C21"/>
      <stop offset="100%" stop-color="#0F252B"/>
    </linearGradient>
    <radialGradient id="cyanAura" cx="18%" cy="12%" r="60%">
      <stop offset="0%"  stop-color="#38FFF9" stop-opacity=".25"/>
      <stop offset="100%" stop-color="#38FFF9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="amberAura" cx="85%" cy="20%" r="55%">
      <stop offset="0%"  stop-color="#FFB400" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#FFB400" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="boltFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#FFE172"/>
      <stop offset="100%" stop-color="#FFB400"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="220" cy="140" rx="500" ry="340" fill="url(#cyanAura)"/>
  <ellipse cx="980" cy="170" rx="480" ry="300" fill="url(#amberAura)"/>

  <!-- Title -->
  <g fill="#EAF9F8">
    <text x="80" y="290" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="72" font-weight="800" letter-spacing=".5">
      The Daily Brain Bolt
    </text>
    <rect x="80" y="310" width="320" height="6" rx="3" fill="#FFB400"/>
    <text x="80" y="380" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="32" font-weight="600" fill="#B9E8E5">
      Shock your synapses. Keep the streak alive.
    </text>
  </g>

  <!-- Big bolt on right -->
  <g transform="translate(760,120) scale(1.25)">
    <path d="M140 0 L60 120 L120 120 L80 240 L180 110 L120 110 Z"
          fill="url(#boltFill)" stroke="#FFCB47" stroke-width="8"
          style="filter: drop-shadow(0 18px 28px rgba(255,180,0,.3)) drop-shadow(0 26px 48px rgba(56,255,249,.22));"/>
  </g>
</svg>
