<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Brain ⚡ Bolt</title>

  <!-- PWA / Icons -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#162022" />

  <!-- Styles -->
  <link rel="stylesheet" href="/style.css" />

  <!-- Config/script deps -->
  <script src="/firebase-config.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script defer src="/app.js"></script>
</head>
<body>
  <!-- Splash -->
  <div id="splash" role="dialog" aria-label="Loading">
    <div class="splash-inner">
      <img src="/app-icon.svg" alt="Brain Bolt Logo" class="splash-logo" />
      <h1 class="splash-title"><span class="title-mask">Brain <span class="bolt">⚡</span> Bolt</span></h1>
      <div class="splash-wipe"></div>
    </div>
  </div>

  <!-- Topbar -->
  <div class="topbar">
    <button id="mmMenuBtn" class="menu-btn">☰</button>
    <button id="soundBtn" class="sound-btn">🔊</button>
  </div>

  <!-- Side Menu -->
  <nav id="mmSideMenu" class="side-menu">
    <ul>
      <li><a href="/index.html" aria-current="page">Home</a></li>
      <li><a href="/menu.html">Menu</a></li>
      <li><a href="/about.html">About</a></li>
      <li><a href="/terms.html">Terms</a></li>
      <li><a href="/privacy.html">Privacy</a></li>
      <li><a href="/contact.html">Contact</a></li>
      <li><a href="/pro.html" class="pro-link">Go Pro</a></li>
    </ul>
  </nav>

  <!-- Header -->
  <header class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-inner">
      <h1 class="hero-title">Brain <span class="bolt">⚡</span> Bolt</h1>
      <p class="subtitle">Your Daily Challenge</p>
    </div>
  </header>

  <!-- Main Quiz Area -->
  <main class="container">
    <section id="daily" class="card">
      <div class="status-bar">
        <span id="dateLabel"></span>
        <span id="setLabel" class="pill">Ready</span>
      </div>

      <div id="countdown" class="countdown" style="display:none;"></div>
      <div id="timerWrapper" class="timer-wrap">
        <div id="timerBar" class="timer-bar"></div>
        <span id="elapsedTime" class="elapsed">0s</span>
      </div>

      <div id="questionBox" class="question-box">Press Start Quiz</div>
      <div id="choices" class="choices"></div>
      <div id="gameOverBox" class="game-over">Game Over</div>

      <div class="cta-row">
        <button id="startBtn" class="btn primary">Start Quiz</button>
        <button id="shuffleBtn" class="btn shuffle">Shuffle</button>
        <button id="shareBtn" class="btn outline">Share</button>
        <button id="themeBtn" class="btn outline">Theme</button>
        <button id="playAgainBtn" class="btn again">Play Again</button>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    © 2025 Brain ⚡ Bolt •
    <a href="/about.html" class="footer-link">About</a> •
    <a href="/terms.html" class="footer-link">Terms</a> •
    <a href="/privacy.html" class="footer-link">Privacy</a> •
    <a href="/contact.html" class="footer-link">Contact</a>
  </footer>

  <script>
    window.addEventListener('load', () => {
      const s = document.getElementById('splash');
      s?.classList.add('show');
      setTimeout(() => s?.classList.add('mid'), 650);
      setTimeout(() => s?.classList.add('hide'), 2200);
    });
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js').catch(()=>{});
    }
  </script>
</body>
</html>
