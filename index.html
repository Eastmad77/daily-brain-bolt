<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Daily BrainBolt</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="/style.css" />

  <!-- PWA / Icons -->
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#0D2430" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- Social -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://dailybrainbolt.com/" />
  <meta property="og:title" content="The Daily BrainBolt" />
  <meta property="og:description" content="Shock your synapses with a daily dose of trivia. Keep your streak alive!" />
  <meta property="og:image" content="https://dailybrainbolt.com/og-image-dark.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- CSV Parser -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" defer></script>
</head>
<body>

  <header class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-inner">
      <img class="brand-mark" src="/app-icon.svg" alt="BrainBolt icon" />
      <h1 class="brand-title">The Daily BrainBolt</h1>
      <p class="subtitle">Shock your synapses and keep your streak alive!</p>

      <div class="cta-row">
        <button id="startBtn" class="btn primary">Start Quiz</button>
        <button id="shuffleBtn" class="btn ghost">Shuffle</button>
        <button id="shareBtn" class="btn outline">Share</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="card bar-card">
      <div class="bar-top">
        <div><strong>Score:</strong> <span id="score">0</span></div>
        <div><strong>Progress:</strong> <span id="progressText">0/0</span></div>

        <div id="timerWrap" class="timer-wrap" aria-hidden="true">
          <div id="timerBar" class="timer-bar"></div>
          <span id="timerText" class="timer-text">10s</span>
        </div>
      </div>
      <div class="progress"><div id="progressFill" class="progress-fill"></div></div>
    </section>

    <section class="card" id="quiz-card" aria-live="polite">
      <div class="meta">
        <span id="metaText" class="meta-text">Daily set</span>
        <span class="spacer"></span>
        <span id="today" class="meta-date"></span>
      </div>

      <!-- Hidden CSV/debug status (won’t show to users) -->
      <div id="statusline" class="sr-only" aria-hidden="true"></div>

      <div id="question" class="question">Press “Start Quiz” to begin.</div>
      <div id="options" class="options"></div>

      <div class="actions">
        <button id="showAnswerBtn" class="btn primary" style="display:none;">Show Answer</button>
        <button id="playAgain" class="btn ghost" style="display:none;">Play again</button>
      </div>

      <div id="feedback" class="feedback" aria-live="polite"></div>
    </section>
  </main>

  <footer class="footer">
    <div class="foot-inner">
      <div>© <span id="year"></span> The Daily BrainBolt</div>
      <nav class="foot-nav">
        <a href="/about.html">About</a>
        <a href="/terms.html">Terms</a>
        <a href="/privacy.html">Privacy</a>
        <a href="mailto:info@dailybrainbolt.com">Contact</a>
      </nav>
    </div>
  </footer>

  <!-- Your app logic -->
  <script src="/app.js"></script>

  <!-- Service Worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .catch(err => console.log('SW registration failed:', err));
      });
    }
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
