<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>The Daily BrainBolt</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">

  <!-- Favicon & Icons -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#0B1C21">

  <!-- Primary Meta -->
  <meta name="title" content="The Daily BrainBolt">
  <meta name="description" content="Shock your synapses with a 60-second dose of trivia. Keep your streak alive.">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://dailybrainbolt.com/">
  <meta property="og:title" content="The Daily BrainBolt">
  <meta property="og:description" content="Shock your synapses with a 60-second dose of trivia. Keep your streak alive.">
  <meta property="og:image" content="https://dailybrainbolt.com/og-image-dark.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://dailybrainbolt.com/">
  <meta name="twitter:title" content="The Daily BrainBolt">
  <meta name="twitter:description" content="Shock your synapses with a 60-second dose of trivia. Keep your streak alive.">
  <meta name="twitter:image" content="https://dailybrainbolt.com/og-image-dark.png">

  <!-- CSV Parser -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body>

  <header class="hero">
    <div class="hero-inner">
      <div class="logo-wrap">
        <img src="/app-icon.svg" alt="BrainBolt logo" class="logo" width="48" height="48">
        <h1>The Daily BrainBolt</h1>
      </div>
      <p class="subtitle">Shock your synapses. Keep the streak alive!</p>

      <div class="action-buttons">
        <button id="startBtn" class="btn primary">Start Quiz</button>
        <button id="shuffleBtn" class="btn ghost">Shuffle & Start</button>
        <button id="shareBtn" class="btn accent">Share</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="card bar-card">
      <div class="bar-top">
        <div><strong>Score:</strong> <span id="score">0</span></div>
        <div><strong>Progress:</strong> <span id="progressText">0/0</span></div>
      </div>
      <div class="progress"><div id="progressFill" class="progress-fill"></div></div>
    </section>

    <section class="card" id="quiz-card">
      <div class="meta">
        <span id="metaText" class="meta-text">Click <strong>Start Quiz</strong> to begin.</span>
        <span class="spacer"></span>
        <span id="today" class="meta-date"></span>
      </div>

      <div id="statusline" style="color:#8FE7EC;font-size:12px;margin:-4px 0 6px 0;"></div>

      <div id="question" class="question">—</div>
      <div id="options" class="options"></div>

      <button id="showAnswerBtn" class="btn primary" style="display:none;">Show Answer</button>

      <div id="feedback" class="feedback" aria-live="polite"></div>
      <button id="playAgain" class="btn ghost" style="display:none;">Play again</button>
    </section>

    <!-- Countdown timer -->
    <section class="card timer-card">
      <div class="timer">
        <div id="timerFill" class="timer-fill"></div>
        <span id="timerLabel" class="timer-label">10</span>
      </div>
    </section>
  </main>

  <footer class="footer">© 2025 The Daily BrainBolt</footer>

  <!-- Quiz logic -->
  <script src="app.js"></script>

  <!-- PWA: register service worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('Service Worker registered:', reg.scope))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
