<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Brain ⚡ Bolt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="icon" href="/favicon.svg">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="/app.js" defer></script>
</head>
<body>
  <!-- Splash -->
  <div class="splash" id="startSplash">
    <img src="/app-icon.svg" class="splash-logo" alt="Brain Bolt logo">
    <h1 class="splash-title">Brain ⚡ Bolt</h1>
  </div>

  <!-- Header -->
  <header class="topbar">
    <div class="left">
      <button id="mmMenuBtn">☰</button>
      <img src="/app-icon.svg" class="logo" alt="logo">
      <span>Brain ⚡ Bolt</span>
    </div>
    <div class="actions">
      <button id="soundBtn">🔊</button>
      <button id="notifyBtn">🔔</button>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="side-menu" id="mmSideMenu">
    <nav class="menu-nav">
      <a href="/" aria-current="page">Home</a>
      <a href="/about.html">About</a>
      <a href="/contact.html">Contact</a>
      <a href="/privacy.html">Privacy</a>
      <a href="/terms.html">Terms</a>
      <a href="/signin.html">Sign In</a>
    </nav>
  </aside>

  <!-- Main -->
  <main>
    <div id="setLabel">Ready</div>
    <div id="dateLabel"></div>
    <div id="progressLabel"></div>
    <div class="timer-wrapper"><div id="timerBar" class="timer-bar"></div></div>
    <div id="elapsedTime">0:00</div>

    <div id="questionBox" class="question-box">Press Start to Play</div>
    <div id="choices" class="choices"></div>

    <div class="controls">
      <button id="startBtn">Start</button>
      <button id="shuffleBtn">Shuffle</button>
      <button id="shareBtn">Share</button>
    </div>

    <div id="gameOverBox" style="display:none">
      <p id="gameOverText"></p>
      <button id="playAgainBtn">Play Again</button>
    </div>
  </main>

  <footer class="footer">
    <p>© 2025 Brain Bolt | <a href="/privacy.html">Privacy</a> | <a href="/terms.html">Terms</a></p>
  </footer>
</body>
</html>
