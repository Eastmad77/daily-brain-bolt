<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BrainBolt — spark your day</title>

  <!-- Icons & PWA -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" sizes="192x192" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#162022">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet"/>

  <!-- Styles -->
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <!-- Topbar -->
  <div class="topbar">
    <button id="mmMenuBtn" class="menu-btn" aria-label="Open menu">☰</button>
    <button id="muteBtn" class="mute-btn" aria-label="Sound on/off" title="Sound">
      🔊
    </button>
  </div>

  <!-- Slide-out Menu -->
  <nav id="mmSideMenu" class="side-menu" aria-hidden="true">
    <ul>
      <li><a href="/index.html">Home</a></li>
      <li><a href="/menu.html">Menu</a></li>
      <li><a href="/about.html">About</a></li>
      <li><a href="/terms.html">Terms</a></li>
      <li><a href="/privacy.html">Privacy</a></li>
      <li><a href="/contact.html">Contact</a></li>
      <li><a href="/pro.html" class="pro-link">Go Pro 🚀</a></li>
      <li><button id="themeToggle" class="btn outline" type="button">Toggle Light/Dark</button></li>
    </ul>
  </nav>

  <!-- Splash -->
  <div id="splash" class="splash-screen">
    <div class="splash-inner">
      <img src="/app-icon.svg" alt="BrainBolt" class="splash-logo" />
      <div class="splash-title">
        <span>BrainBo</span>
        <svg class="bolt" viewBox="0 0 64 64" aria-hidden="true">
          <path d="M36 4 20 32h12l-4 28 16-28H28z" fill="rgb(74,201,255)"/>
        </svg>
        <span>t</span>
      </div>
    </div>
  </div>

  <!-- Hero -->
  <header class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-inner">
      <div class="hero-title">
        <img src="/app-icon.svg" class="app-icon-large" alt="BrainBolt Icon" />
        <h1>
          <span>BrainBo</span>
          <svg class="bolt bolt-inline" viewBox="0 0 64 64" aria-hidden="true">
            <path d="M36 4 20 32h12l-4 28 16-28H28z" fill="rgb(74,201,255)"/>
          </svg>
          <span>t</span>
        </h1>
      </div>
      <p class="subtitle">Daily sparks. Sharper minds. One minute at a time.</p>
    </div>
  </header>

  <main class="container">
    <!-- Score / Progress -->
    <section class="card bar-card">
      <div class="bar-top">
        <div><strong>Score:</strong> <span id="score">0</span></div>
        <div><strong>Progress:</strong> <span id="progressText">0/0</span></div>
      </div>
      <div class="progress"><div id="progressFill" class="progress-fill"></div></div>

      <div class="timer-row">
        <div id="timerBar"></div>
        <div class="elapsed" id="elapsed">00:00</div>
      </div>
    </section>

    <!-- Quiz Card -->
    <section class="card" id="quiz-card">
      <div class="meta">
        <span id="metaText" class="meta-text">Ready</span>
        <span class="spacer"></span>
        <span id="today" class="meta-date"></span>
      </div>

      <div id="question" class="question">Press Start Quiz</div>
      <div id="options" class="options"></div>

      <div class="cta-row">
        <button id="startBtn"   class="btn primary bb-eq">Start Quiz</button>
        <button id="shuffleBtn" class="btn shuffle bb-eq">Shuffle</button>
        <button id="shareBtn"   class="btn outline bb-eq">Share</button>
        <button id="playAgain"  class="btn playagain bb-eq" style="display:none;">Play again</button>
      </div>

      <div id="feedback" class="feedback" aria-live="polite"></div>
    </section>
  </main>

  <footer class="footer">
    © 2025 BrainBolt •
    <a href="/about.html">About</a> •
    <a href="/terms.html">Terms</a> •
    <a href="/privacy.html">Privacy</a> •
    <a href="/contact.html">Contact</a>
  </footer>

  <!-- CSV parser -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <!-- Firebase (compat) if you use sign-in/notifications on Home -->
  <script src="/firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>

  <!-- App -->
  <script src="/app.js"></script>

  <!-- Menu + auto-hide -->
  <script>
    (function initMenu(){
      const btn=document.getElementById('mmMenuBtn');
      const panel=document.getElementById('mmSideMenu');
      let hideTimer=null;
      const close=()=>{panel.classList.remove('open');panel.setAttribute('aria-hidden','true');clearTimeout(hideTimer);};
      const open =()=>{panel.classList.add('open');panel.setAttribute('aria-hidden','false');restartAutoHide();};
      function restartAutoHide(){clearTimeout(hideTimer);hideTimer=setTimeout(close,5000);}
      btn?.addEventListener('click',open);
      panel.addEventListener('mouseenter',()=>clearTimeout(hideTimer));
      panel.addEventListener('mouseleave',()=>{restartAutoHide();});
      panel.querySelectorAll('a,button').forEach(el=>el.addEventListener('click',close));
      document.addEventListener('keydown',e=>{if(e.key==='Escape')close();});
    })();
  </script>
</body>
</html>
