<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Brain ⚡ Bolt</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#1a73e8">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>
  <!-- Start Splash -->
  <div id="startSplash" class="splash">
    <div class="splash-inner">
      <div class="splash-badge">
        <img src="/app-icon.svg" alt="Brain Bolt Logo">
      </div>
      <h1 class="splash-title">Brain <span class="bolt">⚡</span> Bolt</h1>
      <button id="startBtn" class="btn primary">Start Quiz</button>
    </div>
  </div>

  <!-- Success Splash -->
  <div id="successSplash" class="success-splash" aria-hidden="true" style="display:none;">
    <div class="splash-inner">
      <h2 class="splash-title">Quiz <span class="bolt">⚡</span> Complete!</h2>
      <p class="splash-msg">A fresh quiz will be ready for you tomorrow</p>
      <div class="splash-buttons">
        <a href="#" id="ssPlayAgain" class="btn primary">🔄 Play Again</a>
        <a href="/" id="ssHomeBtn" class="btn">🏠 Home</a>
        <a href="#" id="ssShareScore" class="btn ghost">📤 Share</a>
      </div>
    </div>
  </div>

  <!-- Countdown Overlay -->
  <div id="countdownOverlay" class="countdown-overlay" hidden>
    <div id="countNum" class="countdown-dot">3</div>
  </div>

  <!-- Sidebar -->
  <aside id="sideMenu" class="side-menu">
    <nav class="menu-nav">
      <a href="/about.html">About</a>
      <a href="/privacy.html">Privacy</a>
      <a href="/terms.html">Terms</a>
      <a href="/contact.html">Contact</a>
      <button id="signInBtn">Sign In</button>
    </nav>
  </aside>

  <!-- Topbar -->
  <header class="topbar">
    <div class="hero-bg"><img src="/header-graphic.svg" alt=""></div>
    <div class="hero-inner">
      <div class="brand">
        <img src="/app-icon.svg" alt="Logo" class="logo">
        <div class="brand-text">
          <h1>Brain ⚡ Bolt</h1>
          <div class="tagline">Daily Quiz Challenge</div>
        </div>
      </div>
      <div class="actions">
        <button id="menuToggle">☰</button>
        <button id="soundBtn">🔊</button>
      </div>
    </div>
    <div class="status">
      <span id="setLabel">Today's Set</span>
      <span id="pillScore">Score 0</span>
      <span id="pillStreak">Streak 0</span>
      <span id="progressLabel">Q 0/12</span>
    </div>
  </header>

  <!-- Main Game -->
  <main class="container">
    <div class="card quiz-card">
      <div class="timer-wrapper"><div id="timerBar" class="timer-bar"></div></div>
      <div class="qtimer-wrapper"><div id="qTimerBar" class="qtimer-bar"></div></div>
      <div id="elapsedTime" class="elapsed-time">0:00</div>
      <div id="questionBox" class="question-box">Press Start to Begin</div>
      <div id="choices" class="choices"></div>
      <div class="controls">
        <button id="shuffleBtn" class="btn ghost">Shuffle</button>
        <button id="shareBtn" class="btn ghost">Share</button>
      </div>
    </div>

    <div id="gameOverBox" class="card" style="display:none;">
      <p id="gameOverText"></p>
      <button id="playAgainBtn" class="btn primary">Play Again</button>
    </div>
  </main>

  <footer class="footer">
    © 2025 Brain Bolt. All Rights Reserved.
  </footer>

  <script src="/shell.js"></script>
  <script src="/app.js"></script>
</body>
</html>
