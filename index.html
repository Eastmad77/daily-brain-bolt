<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Brain ⚡ Bolt</title>

  <!-- PWA + Icons -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#152021">

  <!-- Styles -->
  <link rel="stylesheet" href="/style.css">

  <!-- Config -->
  <script src="/firebase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash" class="splash" aria-hidden="true">
    <img src="/app-icon.svg" alt="Brain Bolt Icon" class="splash-logo">
    <h1 class="splash-title">Brain <span class="bolt">⚡</span> Bolt</h1>
  </div>

  <!-- Side Menu -->
  <aside id="mmSideMenu" class="side-menu" aria-hidden="true">
    <button id="mmMenuBtn" class="menu-btn">☰</button>
    <nav class="menu-nav">
      <a href="/index.html">🏠 Home</a>
      <a href="/about.html">ℹ️ About</a>
      <a href="/contact.html">✉️ Contact</a>
      <a href="/privacy.html">🔒 Privacy</a>
      <a href="/terms.html">📄 Terms</a>
      <a href="/signin.html">🔑 Sign In</a>
    </nav>
    <div class="menu-controls">
      <button id="themeBtn" aria-label="Toggle theme"></button>
      <button id="soundBtn" aria-label="Toggle sound">🔊</button>
      <button id="notifyBtn" aria-label="Enable notifications">🔔</button>
    </div>
  </aside>

  <!-- Main App -->
  <main>
    <header class="topbar">
      <div id="dateLabel"></div>
      <div id="setLabel">Ready</div>
      <div id="progressLabel">Q 0/12</div>
    </header>

    <!-- Countdown -->
    <div id="countdown" class="countdown"></div>

    <!-- Timer -->
    <div id="timerWrapper" class="timer-wrapper">
      <div id="timerBar" class="timer-bar"></div>
    </div>
    <div id="elapsedTime" class="elapsed-time">0:00</div>

    <!-- Question -->
    <section>
      <div id="questionBox" class="question-box">Press Start Quiz</div>
      <div id="choices" class="choices"></div>
    </section>

    <!-- Controls -->
    <div class="controls">
      <button id="startBtn">▶️ Start Quiz</button>
      <button id="shuffleBtn">🔀 Shuffle</button>
      <button id="shareBtn">📤 Share</button>
      <button id="playAgainBtn" style="display:none;">🔄 Play Again</button>
    </div>

    <!-- Game Over -->
    <div id="gameOverBox" class="game-over" style="display:none;">
      <h2>Game Over</h2>
    </div>
  </main>

  <!-- Success Splash -->
  <div id="successSplash" class="success-splash">
    <div class="success-content">
      <h2>🎉 Well done!</h2>
      <p>You completed today’s quiz!</p>
      <button id="ssDismiss">OK</button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js').then(reg => {
        if (reg.waiting) reg.waiting.postMessage('SKIP_WAITING');
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          nw?.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              nw.postMessage('SKIP_WAITING');
            }
          });
        });
      });
    }
  </script>
</body>
</html>
