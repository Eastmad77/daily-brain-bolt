<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Brain ⚡ Bolt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- PWA -->
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="icon" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/icon-192.png" />

  <!-- Styles -->
  <link rel="stylesheet" href="/style.css?v=fix1" />

  <!-- Libs -->
  <script defer src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <!-- App -->
  <script defer src="/shell.js?v=fix1"></script>
  <script defer src="/app.js?v=fix1"></script>
</head>
<body>
  <!-- Start Splash -->
  <div id="startSplash" class="splash" aria-hidden="false">
    <div class="splash-inner">
      <div class="splash-badge">
        <img src="/app-icon.svg" alt="App Icon" />
      </div>
      <h1 class="splash-title">
        Brain <span class="zap">⚡</span> Bolt
      </h1>
    </div>
  </div>

  <!-- Header -->
  <header class="topbar hero">
    <div class="hero-bg"><img src="/header-graphic.svg" alt="" /></div>
    <div class="hero-inner">
      <div class="brand">
        <img src="/app-icon.svg" class="logo" alt="logo" />
        <h1 class="brand-text">Brain ⚡ Bolt</h1>
      </div>
      <div class="actions">
        <button id="soundBtn" aria-label="Toggle sound">🔊</button>
        <button id="mmMenuBtn" class="menu" aria-label="Open menu">☰</button>
      </div>
    </div>
  </header>

  <!-- Main Game -->
  <main class="container">
    <section class="card quiz-card">
      <div class="timer-wrapper"><div id="timerBar" class="timer-bar"></div></div>
      <div class="qtimer-wrapper"><div id="qTimerBar" class="qtimer-bar"></div></div>

      <div class="meta">
        <span id="elapsedTime" class="elapsed-time">0:00</span>
        <span id="pillScore">Score 0</span>
        <span id="pillStreak">Streak 0</span>
      </div>

      <div id="questionBox" class="question-box">Press Start to Play</div>
      <div id="choices" class="choices"></div>

      <div class="controls">
        <button id="startBtn" class="btn primary">▶️ Start</button>
        <button id="shuffleBtn" class="btn">🔀 Shuffle</button>
        <button id="shareBtn" class="btn ghost">📤 Share</button>
        <button id="playAgainBtn" class="btn" style="display:none;">🔄 Play Again</button>
      </div>

      <div id="gameOverBox" class="gameover" style="display:none;">
        <p id="gameOverText"></p>
      </div>
    </section>
  </main>

  <!-- Countdown -->
  <div id="countdownOverlay" class="countdown-overlay" hidden>
    <div id="countNum" class="countdown-dot">3</div>
  </div>

  <!-- Success Splash -->
  <div id="successSplash" class="success-splash" aria-hidden="true">
    <div class="splash-inner">
      <div class="splash-badge">
        <img src="/app-icon.svg" alt="App Icon" />
      </div>
      <h2 class="splash-title">Quiz Complete!</h2>
      <p class="splash-msg">A fresh quiz will be ready tomorrow ⚡</p>
      <div class="splash-buttons">
        <button id="ssPlayAgain" class="btn primary">🔄 Play Again</button>
        <a id="ssHomeBtn" href="/" class="btn">🏠 Home</a>
        <button id="ssShareScore" class="btn ghost">📤 Share</button>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>© 2025 Brain ⚡ Bolt · <a href="/privacy.html">Privacy</a> · <a href="/terms.html">Terms</a></p>
  </footer>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js?v=fix1');
    }
  </script>
</body>
</html>
