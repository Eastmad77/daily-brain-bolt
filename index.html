<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Daily BrainBolt</title>

  <!-- Icons & PWA -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#0E1E27">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/style.css">

  <!-- PapaParse -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash" class="splash-screen" aria-hidden="true">
    <div class="splash-inner">
      <img src="/app-icon.svg" alt="BrainBolt Icon" class="splash-logo" />
      <h1 class="splash-title">The Daily BrainBolt</h1>
    </div>
  </div>

  <!-- Topbar -->
  <div class="topbar">
    <button id="mmMenuBtn" class="menu-btn" aria-label="Open menu">☰</button>
  </div>

  <!-- Side Menu -->
  <nav id="mmSideMenu" class="side-menu" aria-hidden="true">
    <button id="mmCloseMenu" class="close-btn" aria-label="Close menu">✕</button>
    <ul>
      <li><a href="/index.html">Home</a></li>
      <li><a href="/about.html">About</a></li>
      <li><a href="/terms.html">Terms</a></li>
      <li><a href="/privacy.html">Privacy</a></li>
      <li><a href="/contact.html">Contact</a></li>
      <li><button id="btnSignIn" class="btn outline">Sign in with Google</button></li>
      <li><button id="btnNotify" class="btn ghost">Enable Notifications</button></li>
    </ul>
  </nav>

  <!-- Hero -->
  <header class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-inner">
      <div class="hero-title">
        <img src="/app-icon.svg" alt="BrainBolt Icon" class="app-icon-large">
        <h1>The Daily BrainBolt</h1>
      </div>
      <p class="subtitle">Shock your synapses with 12 fresh questions a day.</p>
    </div>
  </header>

  <!-- Main -->
  <main class="container">
    <!-- Score -->
    <section class="card bar-card">
      <div class="bar-top">
        <div><strong>Score:</strong> <span id="score">0</span></div>
        <div><strong>Progress:</strong> <span id="progressText">0/0</span></div>
      </div>
      <div class="progress"><div id="progressFill" class="progress-fill"></div></div>

      <div class="timer-row">
        <div id="timerBar"></div>
        <div id="elapsed" class="elapsed">00:00</div>
      </div>
    </section>

    <!-- Quiz -->
    <section class="card" id="quiz-card">
      <div class="meta">
        <span id="metaText" class="meta-text">Press Start Quiz</span>
        <span class="spacer"></span>
        <span id="today" class="meta-date"></span>
      </div>

      <div id="question" class="question">Loading…</div>
      <div id="options" class="options"></div>

      <div class="cta-row">
        <button id="startBtn" class="btn primary">Start Quiz</button>
        <button id="shuffleBtn" class="btn shuffle">Shuffle</button>
        <button id="shareBtn" class="btn outline">Share</button>
        <button id="playAgain" class="btn ghost" style="display:none;">Play again</button>
      </div>

      <div id="feedback" class="feedback" aria-live="polite"></div>
    </section>
  </main>

  <footer class="footer">
    © 2025 The Daily BrainBolt •
    <a href="/about.html">About</a> •
    <a href="/terms.html">Terms</a> •
    <a href="/privacy.html">Privacy</a> •
    <a href="/contact.html">Contact</a>
  </footer>

  <!-- Firebase -->
  <script src="/firebase-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>

  <!-- App -->
  <script src="/app.js"></script>

  <!-- Side Menu JS -->
  <script>
    (function initMenu(){
      const btn=document.getElementById('mmMenuBtn');
      const panel=document.getElementById('mmSideMenu');
      const closeBtn=document.getElementById('mmCloseMenu');
      const open=()=>{panel.classList.add('open');panel.setAttribute('aria-hidden','false');};
      const close=()=>{panel.classList.remove('open');panel.setAttribute('aria-hidden','true');};
      btn?.addEventListener('click',open);
      closeBtn?.addEventListener('click',close);
      document.addEventListener('keydown',e=>{if(e.key==='Escape')close();});
    })();
  </script>

  <!-- Splash Fade -->
  <script>
    document.addEventListener("DOMContentLoaded",()=>{
      const splash=document.getElementById("splash");
      setTimeout(()=>{
        splash.classList.add("fade-out");
        setTimeout(()=>splash.remove(),800);
      },2000);
    });
  </script>

  <!-- Service Worker -->
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load',()=>{
        navigator.serviceWorker.register('/service-worker.js').catch(()=>{});
      });
    }
  </script>
</body>
</html>
