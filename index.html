<!DOCTYPE html>

<body>
  <!-- Initial SPLASH (blue theme, icon → title wipe) -->
  <div id="splash" role="dialog" aria-label="Loading">
    <div class="splash-inner">
      <img src="/app-icon.svg" alt="Brain Bolt Logo" class="splash-logo" />
      <h1 class="splash-title">
        <span class="title-mask">Brain <span class="bolt">⚡</span> Bolt</span>
      </h1>
      <div class="splash-wipe"></div>

  <div id="successSplash" aria-hidden="true">
    <div class="ss-confetti"></div>
    <div class="ss-confetti delay1"></div>
    <div class="ss-confetti delay2"></div>

    <div class="ss-card">
      <img class="ss-logo" src="/app-icon.svg" alt="" />
      <h2 class="ss-title">Nice work! 🎉</h2>
      <p class="ss-sub">You finished today’s quiz</p>
      <button id="ssDismiss" class="btn primary">Continue</button>
    </div>
  </div>

  <!-- App shell -->
  <div id="appRoot" class="app-root">
    <div class="topbar">
      <button id="mmMenuBtn" class="menu-btn" aria-label="Open menu">☰</button>
      <div>
        <button id="notifyBtn" class="sound-btn" title="Daily reminder">🔔</button>
        <button id="soundBtn" class="sound-btn" aria-label="Toggle sound" title="Sound on/off">🔊</button>
      </div>
    </div>

    <nav id="mmSideMenu" class="side-menu" aria-hidden="true">

        <li><a href="/index.html" data-home-link>Home</a></li>
        <li><a href="/about.html">About</a></li>
        <li><a href="/pro.html" class="pro-link">Go Pro</a></li>
        <li><a href="/signin.html">Sign In</a></li>
        <li><a href="/terms.html">Terms</a></li>
        <li><a href="/privacy.html">Privacy</a></li>
        <li><a href="/contact.html">Contact</a></li>
      </ul>
    </nav>

    <header class="hero">
      <div class="hero-overlay"></div>
      <div class="hero-inner">
        <h1 class="hero-title">Brain <span class="bolt">⚡</span> Bolt</h1>
        <p class="subtitle">Your Daily Challenge</p>
      </div>
    </header>

    <main class="container">
      <section id="daily" class="card">
        <div class="status-bar">
          <span id="dateLabel"></span>
          <span id="setLabel" class="pill">Ready</span>
        </div>

        <div id="countdown" class="countdown" style="display:none;"></div>
        <div id="timerWrapper" class="timer-wrap" aria-hidden="true">
          <div id="timerBar" class="timer-bar"></div>
          <span id="elapsedTime" class="elapsed">0s</span>
        </div>

        <div id="questionBox" class="question-box">Press Start Quiz</div>
        <div id="choices" class="choices"></div>
        <div id="gameOverBox" class="game-over" style="display:none;">Game Over</div>

        <div class="cta-row">
          <button id="startBtn" class="btn primary">Start Quiz</button>
          <button id="shuffleBtn" class="btn shuffle">Shuffle</button>
          <button id="shareBtn" class="btn outline">Share</button>
          <button id="themeBtn" class="btn outline">Theme</button>
          <button id="playAgainBtn" class="btn again" style="display:none;">Play Again</button>
        </div>
      </section>
    </main>

    <footer class="footer">
      © 2025 Brain ⚡ Bolt •
      <a href="/about.html" class="footer-link">About</a> •
      <a href="/terms.html" class="footer-link">Terms</a> •
      <a href="/privacy.html" class="footer-link">Privacy</a> •
      <a href="/contact.html" class="footer-link">Contact</a>
    </footer>
  </div>

  <script>
    // Controlled splash — plays on first visit or when forced by Home-link
    (function splashBoot(){
      const splash = document.getElementById('splash');
      const root = document.getElementById('appRoot');
      const key = 'bb_forceSplash';
      const want = sessionStorage.getItem(key) === '1' || !sessionStorage.getItem('bb_seenSplash');

      function run(){
        splash.classList.add('show');
        // mid-stage wipe
        setTimeout(()=>splash.classList.add('mid'), 550);
        // hide & reveal
        setTimeout(()=>{
          splash.classList.add('hide');
          root.style.opacity = '1';
          sessionStorage.setItem('bb_seenSplash','1');
          sessionStorage.removeItem(key);
        }, 2000);
        // failsafe (never freeze)
        setTimeout(()=>{
          splash.classList.add('hide');
          root.style.opacity = '1';
        }, 4000);
      }

      if (want) run(); else { splash.classList.add('hide'); root.style.opacity='1'; }
    })();
