<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Daily BrainBolt</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">

  <!-- PWA / Icons -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#2B2B2B">

  <!-- Social -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://dailybrainbolt.com/">
  <meta property="og:title" content="The Daily BrainBolt">
  <meta property="og:description" content="Shock your synapses with a 60-second dose of trivia. Keep your streak alive.">
  <meta property="og:image" content="https://dailybrainbolt.com/og-image-dark.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://dailybrainbolt.com/">
  <meta name="twitter:title" content="The Daily BrainBolt">
  <meta name="twitter:description" content="Shock your synapses with a 60-second dose of trivia. Keep your streak alive.">
  <meta name="twitter:image" content="https://dailybrainbolt.com/og-image-dark.png">
</head>
<body>

  <!-- Top bar with hamburger -->
  <header class="topbar">
    <button id="menuToggle" class="icon-btn" aria-label="Open menu" aria-controls="menuPanel" aria-expanded="false">
      <!-- Hamburger icon -->
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M3 6h18M3 12h18M3 18h18" stroke="#EAFBFF" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    <div class="brand">
      <img src="/app-icon.svg" alt="BrainBolt" class="brand-logo">
      <span class="brand-name">The Daily BrainBolt</span>
    </div>
    <span id="userBadge" class="user-badge">Guest</span>
  </header>

  <!-- Slide-out menu panel (LEFT) -->
  <aside id="menuPanel" class="menu-panel" aria-hidden="true">
    <div class="menu-header">
      <span>Menu</span>
      <button id="menuClose" class="icon-btn" aria-label="Close menu">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M6 6l12 12M18 6L6 18" stroke="#EAFBFF" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="menu-content">
      <div class="menu-actions">
        <button id="btnSignIn" class="btn ghost full">Sign in with Google</button>
        <button id="btnSignOut" class="btn ghost full">Sign out</button>
        <button id="btnNotify" class="btn outline full">Enable Notifications</button>
      </div>

      <nav class="menu-links">
        <a href="/about.html" class="menu-link">About</a>
        <a href="/terms.html" class="menu-link">Terms</a>
        <a href="/privacy.html" class="menu-link">Privacy</a>
        <a href="/contact.html" class="menu-link">Contact</a>
      </nav>
    </div>
  </aside>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-inner">
      <img src="/app-icon.svg" alt="BrainBolt Logo" class="hero-logo">
      <h1>The Daily BrainBolt</h1>
      <p class="subtitle">Test your knowledge and keep your streak alive!</p>
    </div>
  </section>

  <main class="container">
    <!-- Score + Progress -->
    <section class="card bar-card">
      <div class="bar-top">
        <div><strong>Score:</strong> <span id="score">0</span></div>
        <div><strong>Progress:</strong> <span id="progressText">0/0</span></div>
      </div>
      <div class="progress">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <div class="progress timer">
        <div id="timerFill" class="progress-fill timer-fill"></div>
      </div>
    </section>

    <!-- Quiz card -->
    <section class="card" id="quiz-card">
      <div class="meta">
        <span id="metaText" class="meta-text">Loading…</span>
        <span class="spacer"></span>
        <span id="today" class="meta-date"></span>
      </div>
      <div id="statusline" class="statusline"></div>

      <div id="question" class="question">Loading…</div>
      <div id="options" class="options"></div>

      <div id="feedback" class="feedback" aria-live="polite"></div>

      <div class="cta-row">
        <button id="startBtn" class="btn primary">Start Quiz</button>
        <button id="shuffleBtn" class="btn shuffle">Shuffle</button>
        <button id="shareBtn" class="btn outline">Share</button>
      </div>

      <button id="playAgain" class="btn ghost" style="display:none;">Play Again</button>
    </section>
  </main>

  <footer class="footer">
    © 2025 The Daily BrainBolt •
    <a href="/about.html">About</a> •
    <a href="/terms.html">Terms</a> •
    <a href="/privacy.html">Privacy</a> •
    <a href="/contact.html">Contact</a>
  </footer>

  <!-- Firebase SDKs (compat for global namespace) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>

  <!-- Firebase config (before app.js) -->
  <script src="/firebase-config.js"></script>

  <!-- App -->
  <script src="/app.js" defer></script>
</body>
</html>
