<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Brain ⚡ Bolt</title>

  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#0b1720" />

  <link rel="stylesheet" href="/style.css?v=310" />
  <script src="/firebase-config.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

  <!-- Start Splash -->
  <div class="splash" aria-hidden="true">
    <div class="splash-bg"></div>
    <img src="/app-icon.svg" alt="Brain Bolt" class="splash-logo">
    <h1 class="splash-title"><span class="title-left">Brain</span> <span class="bolt">⚡</span> <span class="title-right">Bolt</span></h1>
  </div>

  <!-- Sidebar -->
  <aside id="mmSideMenu" class="side-menu" aria-hidden="true">
    <nav class="menu-nav" aria-label="Main">
      <a href="/index.html" aria-current="page">🏠 Home</a>
      <a href="/about.html">ℹ️ About</a>
      <a href="/contact.html">✉️ Contact</a>
      <a href="/privacy.html">🔒 Privacy</a>
      <a href="/terms.html">📄 Terms</a>
      <a href="/signin.html">🔑 Sign In</a>
    </nav>
    <div class="menu-controls">
      <button id="soundBtn" aria-label="Toggle sound">🔊</button>
      <button id="notifyBtn" aria-label="Enable notifications">🔔</button>
    </div>
  </aside>

  <main id="appRoot">
    <header class="topbar">
      <button id="mmMenuBtn" class="menu-btn" aria-label="Open menu">☰</button>
      <div id="dateLabel" aria-live="polite"></div>
      <div id="setLabel">Ready</div>
      <div id="progressLabel">Q 0/12</div>
    </header>

    <div class="timer-wrapper"><div id="timerBar" class="timer-bar"></div></div>
    <div id="elapsedTime" class="elapsed-time">0:00</div>

    <section>
      <div id="questionBox" class="question-box">Press Start Quiz</div>
      <div id="choices" class="choices"></div>
    </section>

    <div class="controls">
      <button id="startBtn">▶️ Start Quiz</button>
      <button id="playAgainBtn" style="display:none;">🔄 Play Again</button>
      <button id="shareBtn" class="ghost" style="display:none;">📤 Share</button>
    </div>

    <div id="gameOverBox" class="game-over" style="display:none;">
      <p id="gameOverText"></p>
      <footer class="footer inline-footer">
        <p>
          <a href="#" id="goPlayAgain">🔄 Play Again</a> ·
          <a href="/index.html">🏠 Home</a> ·
          <a href="#" id="goShareScore">📤 Share</a>
        </p>
      </footer>
    </div>

    <footer class="footer">
      <p>© 2025 Brain ⚡ Bolt · <a href="/privacy.html">Privacy</a> · <a href="/terms.html">Terms</a></p>
    </footer>
  </main>

  <!-- Success splash -->
  <div id="successSplash" class="success-splash" role="dialog" aria-modal="true" aria-label="Quiz complete">
    <div class="success-content">
      <h2>🎉 Well done!</h2>
      <p>You completed today’s quiz!</p>
      <button id="ssDismiss" class="btn primary">OK</button>
      <footer class="footer">
        <p>
          <a href="#" id="ssPlayAgain">🔄 Play Again</a> ·
          <a href="/index.html">🏠 Home</a> ·
          <a href="#" id="ssShareScore">📤 Share</a>
        </p>
      </footer>
    </div>
  </div>

  <script src="/app.js?v=310"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js?v=310').then(reg => {
        if (reg.waiting) reg.waiting.postMessage('SKIP_WAITING');
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          nw?.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) nw.postMessage('SKIP_WAITING');
          });
        });
      });
    }
    (function(){ const kill=()=>{const s=document.querySelector('.splash'); if(s) s.remove();}; setTimeout(kill,2200); window.addEventListener('pageshow',()=>setTimeout(kill,2200));})();
  </script>
</body>
</html>
