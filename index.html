<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>The Daily BrainBolt</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">

  <!-- Favicon & Icons -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="mask-icon" href="/favicon.svg" color="#FFB400">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#0B1C21">

  <!-- Primary Meta -->
  <meta name="title" content="The Daily BrainBolt">
  <meta name="description" content="Shock your synapses with a 60-second dose of trivia. Keep your streak alive.">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://incomparable-smakager-64c5de.netlify.app/">
  <meta property="og:title" content="The Daily BrainBolt">
  <meta property="og:description" content="Shock your synapses with a 60-second dose of trivia. Keep your streak alive.">
  <meta property="og:image" content="https://incomparable-smakager-64c5de.netlify.app/og-image-dark.png?v=2">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://incomparable-smakager-64c5de.netlify.app/">
  <meta name="twitter:title" content="The Daily BrainBolt">
  <meta name="twitter:description" content="Shock your synapses with a 60-second dose of trivia. Keep your streak alive.">
  <meta name="twitter:image" content="https://incomparable-smakager-64c5de.netlify.app/og-image-dark.png?v=2">

  <!-- CSV Parser -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body>

  <header class="hero">
    <div class="hero-inner">
      <h1>The Daily BrainBolt</h1>
      <p class="subtitle">Shock your synapses. Keep the streak alive!</p>
      <div style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;">
        <button id="startBtn" class="btn primary">Start Quiz</button>
        <button id="shuffleBtn" class="btn ghost">Shuffle & Start</button>
        <button id="shareBtn" class="btn accent">Share</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="card bar-card">
      <div class="bar-top">
        <div><strong>Score:</strong> <span id="score">0</span></div>
        <div><strong>Progress:</strong> <span id="progressText">0/0</span></div>
      </div>
      <div class="progress"><div id="progressFill" class="progress-fill"></div></div>
    </section>

    <section class="card" id="quiz-card">
      <div class="meta">
        <span id="metaText" class="meta-text">Click <strong>Start Quiz</strong> to begin.</span>
        <span class="spacer"></span>
        <span id="today" class="meta-date"></span>
      </div>
      <div id="statusline" style="color:#8FE7EC;font-size:12px;margin:-4px 0 6px 0;"></div>

      <div id="question" class="question">—</div>
      <div id="options" class="options"></div>

      <button id="showAnswerBtn" class="btn primary" style="display:none;">Show Answer</button>
      <div id="feedback" class="feedback" aria-live="polite"></div>
      <button id="playAgain" class="btn ghost" style="display:none;">Play again</button>
    </section>

    <!-- Countdown timer -->
    <section class="card timer-card">
      <div class="timer">
        <div id="timerFill" class="timer-fill"></div>
        <span id="timerLabel" class="timer-label">10</span>
      </div>
    </section>
  </main>

  <footer class="footer">© 2025 The Daily BrainBolt</footer>

  <script>
    // ====== CONFIG ======
    const SITE_URL = "https://incomparable-smakager-64c5de.netlify.app/";

    // Published-to-web key you verified
    const DEFAULT_SHEET_ID = "2PACX-1vRrjRRrlWpb8tC3iMA6S0hEFLMpkg2cAxLKFqE9Vy-aVQCwv1D5WKYCxHuwo9edF1M_0sBdJEsQ96-c";

    // Tab gids (update if changed in the new copy)
    const LIVE_GID = "1410250735";   // 'live'
    const BANK_GID = "2009978011";   // 'bank'

    const urlParams = new URLSearchParams(window.location.search);
    const SHEET_ID = urlParams.get("sheet") || DEFAULT_SHEET_ID;

    // Build CSV candidates for both published keys and normal IDs
    function csvCandidates(spreadsheetId, gid) {
      const isPublishedKey = String(spreadsheetId).startsWith("2PACX-");
      if (isPublishedKey) {
        const basePub = `https://docs.google.com/spreadsheets/d/e/${spreadsheetId}`;
        return [
          `${basePub}/pub?gid=${gid}&single=true&output=csv`,
          `${basePub}/pub?output=csv`
        ].map(u => u + (u.includes("?") ? "&" : "?") + "cb=" + Date.now());
      }
      const base = `https://docs.google.com/spreadsheets/d/${spreadsheetId}`;
      return [
        `${base}/gviz/tq?tqx=out:csv&gid=${gid}`,
        `${base}/export?format=csv&gid=${gid}`,
        `${base}/pub?gid=${gid}&single=true&output=csv`,
        `${base}/pub?output=csv`
      ].map(u => u + (u.includes("?") ? "&" : "?") + "cb=" + Date.now());
    }

    // ====== ELEMENTS ======
    const elQ = document.getElementById('question');
    const elOpts = document.getElementById('options');
    const elShow = document.getElementById('showAnswerBtn');
    const elFB = document.getElementById('feedback');
    const elMetaText = document.getElementById('metaText');
    const elToday = document.getElementById('today');
    const elProgText = document.getElementById('progressText');
    const elProgFill = document.getElementById('progressFill');
    const elScore = document.getElementById('score');
    const elPlayAgain = document.getElementById('playAgain');
    const elStatus = document.getElementById('statusline');
    const btnStart = document.getElementById('startBtn');
    const btnShuffle = document.getElementById('shuffleBtn');
    const shareBtn = document.getElementById('shareBtn');
    const timerFill = document.getElementById('timerFill');
    const timerLabel = document.getElementById('timerLabel');

    // ====== STATE ======
    const now = new Date();
    const todayKey = [ now.getFullYear(), String(now.getMonth()+1).padStart(2,'0'), String(now.getDate()).padStart(2,'0') ].join('-');
    elToday.textContent = todayKey;

    const norm = s => String(s||'').trim();
    function status(msg){ elStatus.textContent = msg; console.log("[CSV]", msg); }

    let allRows = [], todays = [], idx = 0, score = 0, selected = null;
    let isShuffled = false;

    // Timer
    const TIMER_SECONDS = 10;
    let timerId = null, timeLeft = TIMER_SECONDS;

    function clearTimer(){ if (timerId){ clearInterval(timerId); timerId = null; } }
    function updateTimerUI(){
      const pct = Math.max(0, Math.min(100, (timeLeft / TIMER_SECONDS) * 100));
      timerFill.style.width = pct + "%";
      if (timeLeft <= 3) timerFill.classList.add('urgent'); else timerFill.classList.remove('urgent');
      timerLabel.textContent = Math.ceil(Math.max(0, timeLeft));
    }
    function startTimer(){
      clearTimer();
      timeLeft = TIMER_SECONDS;
      updateTimerUI();
      timerId = setInterval(() => {
        timeLeft = Math.max(0, timeLeft - 0.1);
        updateTimerUI();
        if (timeLeft <= 0){
          clearTimer();
          const q = todays[idx];
          if (q) reveal(q, /*timedOut=*/true);
        }
      }, 100);
    }
    document.addEventListener('visibilitychange', () => { if (document.hidden) clearTimer(); });

    // ====== DATA LOADING ======
    async function fetchCSVTextFromCandidates(candidates){
      let lastDetail = "Unknown error";
      for (const url of candidates){
        status("Trying: " + url);
        try{
          const res = await fetch(url, { cache: "no-store" });
          const text = await res.text();
          if (!res.ok) { lastDetail = `HTTP ${res.status} – ${text.slice(0,140)}…`; throw new Error(lastDetail); }
          if (!text.includes(",") || text.trim().length < 10) { lastDetail = `Non-CSV response: ${text.slice(0,140)}…`; throw new Error(lastDetail); }
          status("Loaded via: " + url);
          return text;
        }catch(e){
          console.warn("CSV attempt failed:", url, e);
        }
      }
      throw new Error(lastDetail);
    }

    function parseCSV(text){
      return new Promise((resolve, reject) => {
        Papa.parse(text, {
          header: true,
          skipEmptyLines: true,
          complete: ({ data }) => resolve(data || []),
          error: (err) => reject(err)
        });
      });
    }

    async function loadRows(){
      if (!SHEET_ID){
        status('No Sheet ID. Add it in index.html or use ?sheet=YOUR_SHEET_ID in the URL.');
        throw new Error("Missing Google Sheet ID");
      }
      // Try LIVE first
      try{
        const liveText = await fetchCSVTextFromCandidates(csvCandidates(SHEET_ID, LIVE_GID));
        const liveRows = (await parseCSV(liveText)).filter(r => r && r.Question);
        if (liveRows.length > 0){
          status(`Loaded ${liveRows.length} rows from "live"`);
          return { rows: liveRows, source: "live" };
        }
        status(`"live" has no rows; trying "bank"…`);
      }catch(e){
        status(`Couldn’t load "live" (${e.message}). Trying "bank"…`);
      }
      // Fallback BANK
      const bankText = await fetchCSVTextFromCandidates(csvCandidates(SHEET_ID, BANK_GID));
      const bankRows = (await parseCSV(bankText)).filter(r => r && r.Question);
      status(`Loaded ${bankRows.length} rows from "bank"`);
      return { rows: bankRows, source: "bank" };
    }

    // ====== QUIZ FLOW ======
    function resetUI(){
      idx = 0; score = 0; selected = null;
      elQ.textContent = "—";
      elOpts.innerHTML = "";
      elFB.innerHTML = "";
      elShow.style.display = "none";
      elPlayAgain.style.display = "none";
      elMetaText.innerHTML = "Preparing your questions…";
      elProgText.textContent = "0/0";
      elProgFill.style.width = "0%";
      elScore.textContent = "0";
      clearTimer();
      timerFill.style.width = "0%";
      timerLabel.textContent = TIMER_SECONDS;
    }

    function updateMeta(){
      elProgText.textContent = `${idx}/${todays.length || 0}`;
      const pct = (todays.length ? (idx / todays.length) : 0) * 100;
      elProgFill.style.width = `${pct}%`;
      elScore.textContent = String(score);
    }

    function showQuestion(){
      const q = todays[idx];
      if (!q){
        elFB.innerHTML = "<div class='correct'>Nice! Done for today. 🎉</div>";
        elPlayAgain.style.display = "inline-flex";
        elPlayAgain.onclick = () => start(isShuffled);
        clearTimer();
        return;
      }
      selected = null;
      elFB.innerHTML = '';
      elShow.style.display = 'none';
      elPlayAgain.style.display = 'none';

      elMetaText.innerHTML = `<span class="accent-text">${q.Difficulty || '—'}</span> • ${q.Category || 'Quiz'}`;
      elQ.textContent = q.Question || '—';

      const opts = [q.OptionA, q.OptionB, q.OptionC, q.OptionD].filter(Boolean);
      elOpts.innerHTML = '';
      opts.forEach((optText) => {
        const btn = document.createElement('button');
        btn.className = 'choice';
        btn.textContent = optText;
        btn.onclick = () => onSelect(btn, optText);
        elOpts.appendChild(btn);
      });

      startTimer();
      updateMeta();
    }

    function onSelect(btn, val){
      document.querySelectorAll('.choice').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selected = val;
      elShow.style.display = 'inline-flex';
      clearTimer();
    }

    elShow.addEventListener('click', () => {
      const q = todays[idx];
      if (!q || !selected) return;
      reveal(q, /*timedOut=*/false);
    });

    function reveal(q, timedOut=false){
      const isCorrect = !timedOut && norm(selected).toLowerCase() === norm(q.Answer).toLowerCase();
      const expl = q.Explanation ? `<div class="expl">${q.Explanation}</div>` : '';
      if (isCorrect){
        elFB.innerHTML = `<div class="correct">⚡ Correct! ${expl}</div>`;
      } else if (timedOut){
        elFB.innerHTML = `<div class="wrong">⏱️ Time’s up! Correct: <strong>${q.Answer}</strong> ${expl}</div>`;
      } else {
        elFB.innerHTML = `<div class="wrong">❌ Not quite. Correct: <strong>${q.Answer}</strong> ${expl}</div>`;
      }
      setTimeout(() => {
        if (isCorrect) { score++; idx++; }
        else { idx = 0; score = 0; }
        updateMeta();
        showQuestion();
      }, 900);
    }

    // ====== START/SHUFFLE/SHARE ======
    async function start(shuffle=false){
      isShuffled = !!shuffle;
      resetUI();
      elMetaText.innerHTML = "Loading questions…";
      try{
        const { rows, source } = await loadRows();
        allRows = rows;
        // Prefer today's set if dates exist; otherwise first 12
        todays = rows.filter(r => norm(r.Date) === todayKey);
        if (!todays.length) todays = rows.slice(0, 12);
        if (isShuffled) todays = shuffleArray(todays);
        status(`Ready (${todays.length} Qs) from ${source}`);
        showQuestion();
      }catch(err){
        console.error(err);
        status("Couldn’t load CSV. Ensure the sheet is shared or published to the web.");
        elMetaText.textContent = "Error fetching CSV. Add ?sheet=<ID> or set DEFAULT_SHEET_ID.";
      }
    }

    function shuffleArray(arr){
      const a = arr.slice();
      for (let i=a.length-1; i>0; i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    btnStart.addEventListener('click', () => start(false));
    btnShuffle.addEventListener('click', () => start(true));

    // Share
    shareBtn.addEventListener('click', async () => {
      const shareData = {
        title: "The Daily BrainBolt",
        text: "Can you keep your streak alive? Play today’s quiz!",
        url: SITE_URL
      };
      if (navigator.share){
        try { await navigator.share(shareData); } catch (e) { /* user cancelled */ }
      } else {
        try {
          await navigator.clipboard.writeText(shareData.url);
          alert("Link copied! Share it with your friends.");
        } catch {
          prompt("Copy this link:", shareData.url);
        }
      }
    });
  </script>
</body>
</html>
