<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Brain ⚡ Bolt – Daily Quiz</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#162022">
  <link rel="stylesheet" href="/style.css">
  <style>
    .brand-title h1 .bolt{
      color: rgb(74,201,255);
      -webkit-text-stroke: 2px rgb(255,140,0);
      text-shadow: 0 0 10px rgba(74,201,255,.35);
    }
  </style>
</head>
<body>
  <!-- Topbar -->
  <div class="topbar">
    <button id="mmMenuBtn" class="menu-btn" aria-label="Open menu">☰</button>
    <div class="topbar-right">
      <button id="themeToggle" class="btn outline small">Theme</button>
      <button id="muteBtn" class="mute-btn" aria-label="Mute/Unmute">🔊</button>
    </div>
  </div>

  <!-- Side Menu -->
  <nav id="mmSideMenu" class="side-menu" aria-hidden="true">
    <ul>
      <li><a href="/index.html">Home</a></li>
      <li><a href="/menu.html">Menu</a></li>
      <li><a href="/about.html">About</a></li>
      <li><a href="/terms.html">Terms</a></li>
      <li><a href="/privacy.html">Privacy</a></li>
      <li><a href="/contact.html">Contact</a></li>
      <li><a href="/pro.html" class="menu-pro">Go Pro</a></li>
      <li><button id="btnSignIn" class="btn outline full">Sign in with Google</button></li>
      <li><button id="btnNotify" class="btn ghost full">Enable Notifications</button></li>
    </ul>
  </nav>

  <!-- Splash (optional; hidden by app.js when complete) -->
  <div id="splash" class="splash hidden">
    <div class="splash-inner">
      <img src="/app-icon.svg" alt="" class="splash-logo">
      <h1 class="splash-title">Brain <span class="bolt">⚡</span> Bolt</h1>
    </div>
  </div>

  <!-- Hero -->
  <header class="hero">
  <div class="hero-overlay"></div>
  <div class="hero-inner brand-title">
    <div class="hero-title">
      <!-- remove any favicon in hero; keep only the main app icon if you want -->
      <img src="/app-icon.svg" alt="App Icon" class="app-icon-large" onerror="this.style.display='none'">
      <h1>Brain <span class="bolt">⚡</span> Bolt</h1>
    </div>
    <p class="subtitle">Ignite your mind every day</p>
  </div>
</header>

  <main class="container">
    <!-- Score/Progress bar card -->
    <section class="card bar-card">
      <div class="bar-top">
        <div><strong>Score:</strong> <span id="score">0</span></div>
        <div><strong>Progress:</strong> <span id="progressText">0/0</span></div>
      </div>
      <div class="progress"><div id="progressFill" class="progress-fill"></div></div>
    </section>

    <!-- Quiz card -->
    <section class="card" id="quiz-card">
      <div class="meta">
        <span id="metaText" class="meta-text">Loading…</span>
        <span class="spacer"></span>
        <span id="today" class="meta-date"></span>
      </div>
      <div id="statusline" class="status"></div>

      <!-- Question box -->
      <div id="question" class="question">Press Start Quiz</div>

      <!-- Options -->
      <div id="options" class="options"></div>

      <!-- Controls -->
      <div class="cta-row">
        <button id="startBtn" class="btn primary">Start Quiz</button>
        <button id="shuffleBtn" class="btn shuffle">Shuffle</button>
        <button id="shareBtn" class="btn outline">Share</button>
        <button id="showAnswerBtn" class="btn primary" style="display:none;">Show Answer</button>
        <button id="playAgain" class="btn ghost" style="display:none;">Play again</button>
      </div>

      <!-- Timer + elapsed -->
      <div class="timers">
        <div class="timer-wrap"><div id="timerBar" class="timer-bar"></div></div>
        <div id="elapsed" class="elapsed">00:00</div>
      </div>

      <div id="feedback" class="feedback" aria-live="polite"></div>
    </section>
  </main>

  <footer class="footer">
    © 2025 Brain <span class="bolt">⚡</span> Bolt •
    <a class="footer-link" href="/about.html">About</a> •
    <a class="footer-link" href="/terms.html">Terms</a> •
    <a class="footer-link" href="/privacy.html">Privacy</a> •
    <a class="footer-link" href="/contact.html">Contact</a> •
    <a class="footer-mail" href="mailto:support@dailybrainbolt.com">support@dailybrainbolt.com</a>
  </footer>

  <script src="/firebase-config.js"></script>
  <script src="/app.js"></script>
</body>
</html>
