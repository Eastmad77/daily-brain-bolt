<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Brain ⚡ Bolt — Daily Quiz</title>

  <!-- Icons / PWA -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#0E1E27">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="/style.css" />

  <!-- Papa Parse (CSV) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" defer></script>
  <!-- App -->
  <script defer src="/app.js"></script>
</head>
<body>

  <!-- Splash (animated, does not auto-start game) -->
  <div id="splash" class="splash" aria-hidden="true">
    <div class="spark">
      <div class="spark-logo"></div>
      <div class="spark-title">
        <span>Brain</span>
        <svg class="bolt" width="30" height="30" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M13 2L3 14h7l-1 8 11-13h-7l0-7z" fill="var(--blue)" stroke="var(--orange)" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        <span>Bolt</span>
      </div>
      <div class="spark-line"></div>
    </div>
  </div>

  <!-- Top bar -->
  <div class="topbar">
    <button id="menuBtn" class="menu-btn" aria-label="Open menu" title="Menu">☰</button>

    <div class="topbar-right">
      <button id="soundBtn" class="icon-btn" aria-label="Sound on/off" title="Sound">
        🔊
      </button>
      <button id="themeBtn" class="icon-btn" aria-label="Toggle theme" title="Theme">
        🌓
      </button>
    </div>
  </div>

  <!-- Slide-out Menu -->
  <nav id="sideMenu" class="side-menu" aria-hidden="true">
    <ul>
      <li><a href="/index.html" id="homeLink">Home</a></li>
      <li><a href="/menu.html">Menu</a></li>
      <li><a href="/pro.html">Go Pro</a></li>
      <li><button id="notifyBtn" class="linklike" type="button">Enable Notifications</button></li>
      <li><button id="signinBtn" class="linklike" type="button">Sign in with Google</button></li>
      <li><a href="/about.html">About</a></li>
      <li><a href="/terms.html">Terms</a></li>
      <li><a href="/privacy.html">Privacy</a></li>
      <li><a href="/contact.html">Contact</a></li>
    </ul>
  </nav>

  <!-- Header -->
  <header class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-inner">
      <div class="hero-title">
        <!-- (Removed favicon image on homepage as requested) -->
        <h1>
          <span>Brain</span>
          <svg class="bolt mid" width="28" height="28" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M13 2L3 14h7l-1 8 11-13h-7l0-7z" fill="var(--blue)" stroke="var(--orange)" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
          <span>Bolt</span>
        </h1>
      </div>
      <p class="subtitle">Shock your synapses daily ⚡ Keep your streak alive.</p>
    </div>
  </header>

  <main class="container">
    <!-- Score / Progress -->
    <section class="card bar-card">
      <div class="bar-top">
        <div><strong>Score:</strong> <span id="score">0</span></div>
        <div><strong>Progress:</strong> <span id="progressText">0/0</span></div>
      </div>
      <div class="progress"><div id="progressFill" class="progress-fill"></div></div>
    </section>

    <!-- Status + Date + Timer -->
    <section class="card" id="quiz-card">
      <div class="meta">
        <span id="metaText" class="meta-text">Ready</span>
        <span class="spacer"></span>
        <span id="today" class="meta-date"></span>
      </div>

      <!-- refined statusline hidden until needed -->
      <div id="statusline" class="statusline" style="display:none;"></div>

      <!-- Question area -->
      <div id="question" class="question">Press “Start Quiz”</div>
      <div id="options" class="options"></div>

      <!-- Timer row -->
      <div class="timer-row">
        <div class="timer-track">
          <div id="timerFill" class="timer-fill"></div>
        </div>
        <div id="elapsed" class="elapsed" aria-live="polite">0.0s</div>
      </div>

      <!-- Controls -->
      <div class="cta-row">
        <button id="startBtn" class="btn primary">Start Quiz</button>
        <button id="shuffleBtn" class="btn shuffle">Shuffle</button>
        <button id="shareBtn" class="btn outline">Share</button>
      </div>

      <!-- After-round feedback & actions -->
      <div id="feedback" class="feedback" aria-live="polite"></div>
      <div class="cta-row">
        <button id="playAgain" class="btn outline" style="display:none;">Play again</button>
      </div>
    </section>
  </main>

  <footer class="footer">
    © <span id="year"></span> Brain ⚡ Bolt •
    <a href="/about.html">About</a> •
    <a href="/terms.html">Terms</a> •
    <a href="/privacy.html">Privacy</a> •
    <a href="/contact.html">Contact</a>
  </footer>

  <!-- 3-second countdown overlay -->
  <div id="countdown" class="countdown" hidden>
    <div class="count-wrap">
      <div id="countNum" class="count-num">3</div>
    </div>
  </div>

</body>
</html>
