<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Brain ⚡ Bolt</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#152021">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash" class="splash" aria-hidden="true">
    <img src="/app-icon.svg" alt="Brain Bolt App Icon" class="splash-logo">
    <h1 class="splash-title">Brain <span class="bolt">⚡</span> Bolt</h1>
  </div>

  <header class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-inner">
      <div class="header-actions">
        <a class="menu-link" href="/menu.html" aria-label="Menu">☰ Menu</a>
      </div>
      <div class="hero-title">
        <h1 class="hero-h1">Brain <span class="bolt">⚡</span> Bolt</h1>
      </div>
      <p class="subtitle">12 fresh questions — every day.</p>
    </div>
  </header>

  <main class="container">
    <section class="card bar-card">
      <div class="bar-top">
        <div><strong>Score:</strong> <span id="score">0</span></div>
        <div><strong>Progress:</strong> <span id="progressText">0/0</span></div>
      </div>
      <div class="progress"><div id="progressFill" class="progress-fill"></div></div>
    </section>

    <section class="card" id="quiz-card">
      <div class="meta">
        <span id="metaText" class="meta-text">Ready</span>
        <span class="spacer"></span>
        <span id="today" class="meta-date"></span>
      </div>

      <div id="question" class="question">Press Start Quiz</div>
      <div id="options" class="options"></div>

      <div id="feedback" class="feedback" aria-live="polite"></div>

      <div class="cta-row">
        <button id="startBtn" class="btn primary">Start Quiz</button>
        <button id="shuffleBtn" class="btn shuffle">Shuffle</button>
        <button id="shareBtn" class="btn outline">Share</button>
        <button id="playAgainBtn" class="btn ghost hidden">Play Again</button>
      </div>
    </section>
  </main>

  <footer class="footer">
    © 2025 Brain ⚡ Bolt •
    <a href="/about.html">About</a> •
    <a href="/terms.html">Terms</a> •
    <a href="/privacy.html">Privacy</a> •
    <a href="/contact.html">Contact</a>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="/app.js"></script>
</body>
</html>
