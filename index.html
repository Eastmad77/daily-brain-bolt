<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Brain ⚡ Bolt</title>

  <!-- PWA & Icons -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#ffffff" />

  <!-- Styles -->
  <link rel="stylesheet" href="/style.css" />

  <!-- Config & CSV Parser -->
  <script src="/firebase-config.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

  <!-- Splash (CSS handles fade-out) -->
  <div class="splash" aria-hidden="true">
    <img src="/app-icon.svg" alt="Brain Bolt" class="splash-logo">
    <h1 class="splash-title">Brain <span class="bolt">⚡</span> Bolt</h1>
  </div>

  <!-- Sidebar menu -->
  <aside id="mmSideMenu" class="side-menu" aria-hidden="true">
    <button id="mmMenuBtn" class="menu-btn" aria-label="Open menu">☰</button>
    <nav class="menu-nav" aria-label="Main">
      <a href="/index.html">🏠 Home</a>
      <a href="/about.html">ℹ️ About</a>
      <a href="/contact.html">✉️ Contact</a>
      <a href="/privacy.html">🔒 Privacy</a>
      <a href="/terms.html">📄 Terms</a>
      <a href="/signin.html">🔑 Sign In</a>
    </nav>
    <div class="menu-controls">
      <button id="themeBtn" aria-label="Toggle theme"></button>
      <button id="soundBtn" aria-label="Toggle sound">🔊</button>
      <button id="notifyBtn" aria-label="Enable notifications">🔔</button>
    </div>
  </aside>

  <main>
    <!-- Top status bar -->
    <header class="topbar">
      <div id="dateLabel" aria-live="polite"></div>
      <div id="setLabel">Ready</div>
      <div id="progressLabel">Q 0/12</div>
    </header>

    <!-- Countdown (optional; shown by JS when starting) -->
    <div id="countdown" class="countdown" style="display:none;"></div>

    <!-- Timer strip + elapsed time -->
    <div id="timerWrapper" class="timer-wrapper">
      <div id="timerBar" class="timer-bar" style="transform:scaleX(0)"></div>
    </div>
    <div id="elapsedTime" class="elapsed-time">0:00</div>

    <!-- Question + choices -->
    <section>
      <div id="questionBox" class="question-box">Press Start Quiz</div>
      <div id="choices" class="choices"></div>
    </section>

    <!-- Controls (only those used by current app.js) -->
    <div class="controls">
      <button id="startBtn" aria-label="Start quiz">▶️ Start Quiz</button>
      <button id="playAgainBtn" style="display:none;" aria-label="Play again">🔄 Play Again</button>
    </div>

    <!-- Game over summary -->
    <div id="gameOverBox" class="game-over" style="display:none;"></div>
  </main>

  <!-- Success splash (shown after 12/12) -->
  <div id="successSplash" class="success-splash" role="dialog" aria-modal="true" aria-label="Quiz complete">
    <div class="success-content">
      <h2>🎉 Well done!</h2>
      <p>You completed today’s quiz!</p>
      <button id="ssDismiss" class="btn primary">OK</button>
    </div>
  </div>

  <!-- App logic -->
  <script src="/app.js"></script>

  <!-- Service worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js').then(reg => {
        if (reg.waiting) reg.waiting.postMessage('SKIP_WAITING');
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          nw?.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              nw.postMessage('SKIP_WAITING');
            }
          });
        });
      });
    }
  </script>
</body>
</html>
