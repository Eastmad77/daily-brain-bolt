<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Daily BrainBolt</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">

  <!-- Icons / PWA -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#262626">

  <!-- Styles -->
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- Global Topbar with Hamburger -->
  <div class="topbar">
    <button id="mmMenuBtn" class="menu-btn" aria-label="Open menu">☰</button>
  </div>

  <!-- Slide-out Menu -->
  <nav id="mmSideMenu" class="side-menu" aria-hidden="true">
    <button id="mmCloseMenu" class="close-btn" aria-label="Close menu">✕</button>
    <ul>
      <li><a href="/index.html">Home</a></li>
      <li><a href="/about.html">About</a></li>
      <li><a href="/terms.html">Terms</a></li>
      <li><a href="/privacy.html">Privacy</a></li>
      <li><a href="/contact.html">Contact</a></li>
    </ul>
  </nav>

  <!-- Header -->
  <header class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-inner">
      <img src="/app-icon.svg" alt="The Daily BrainBolt App Icon" class="app-logo-lg" onerror="this.style.display='none'">
      <div class="hero-title">
        <img src="/favicon.svg" alt="BrainBolt Mini Icon" class="app-logo-sm" onerror="this.style.display='none'">
        <h1>The Daily BrainBolt</h1>
      </div>
      <p class="subtitle">Shock your synapses with a 60-second dose of trivia. Keep your streak alive!</p>
    </div>
  </header>

  <!-- Main Quiz -->
  <main class="container">
    <section class="card bar-card">
      <div class="bar-top">
        <div><strong>Score:</strong> <span id="score">0</span></div>
        <div><strong>Progress:</strong> <span id="progressText">0/0</span></div>
      </div>
      <div class="progress"><div id="progressFill" class="progress-fill"></div></div>
    </section>

    <section class="card" id="quiz-card">
      <div class="meta">
        <span id="today" class="meta-date">—</span>
        <span id="statusBadge" class="status-badge ready">Press Start Quiz</span>
      </div>

      <div id="question" class="question"></div>
      <div id="options" class="options"></div>

      <button id="showAnswerBtn" class="btn primary" style="display:none;">Show Answer</button>

      <div id="feedback" class="feedback" aria-live="polite"></div>
      <div class="cta-row">
        <button id="startBtn" class="btn primary">Start Quiz</button>
        <button id="shuffleBtn" class="btn shuffle">Shuffle</button>
        <button id="shareBtn" class="btn outline">Share</button>
      </div>
      <button id="playAgain" class="btn ghost" style="display:none;">Play again</button>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    © 2025 The Daily BrainBolt •
    <a href="/about.html">About</a> •
    <a href="/terms.html">Terms</a> •
    <a href="/privacy.html">Privacy</a> •
    <a href="/contact.html">Contact</a>
  </footer>

  <!-- App -->
  <script src="/app.js" defer></script>

  <!-- Menu script (isolated) -->
  <script>
    (() => {
      const btn = document.getElementById('mmMenuBtn');
      const panel = document.getElementById('mmSideMenu');
      const closeX = document.getElementById('mmCloseMenu');
      function openPanel(){ panel?.classList.add('open'); panel?.setAttribute('aria-hidden','false'); }
      function closePanel(){ panel?.classList.remove('open'); panel?.setAttribute('aria-hidden','true'); }
      btn?.addEventListener('click', openPanel);
      closeX?.addEventListener('click', closePanel);
      document.addEventListener('keydown', (e)=>{ if(e.key==='Escape') closePanel(); });
    })();
  </script>
</body>
</html>
