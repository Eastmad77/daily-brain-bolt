<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 Not Found • The Daily BrainBolt</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- Global Topbar with Hamburger -->
  <div class="topbar">
    <button id="mmMenuBtn" class="menu-btn" aria-label="Open menu">☰</button>
  </div>

  <!-- Slide-out Menu -->
  <nav id="mmSideMenu" class="side-menu" aria-hidden="true">
    <button id="mmCloseMenu" class="close-btn" aria-label="Close menu">✕</button>
    <ul>
      <li><a href="/index.html">Home</a></li>
      <li><a href="/about.html">About</a></li>
      <li><a href="/terms.html">Terms</a></li>
      <li><a href="/privacy.html">Privacy</a></li>
      <li><a href="/contact.html">Contact</a></li>
    </ul>
  </nav>

  <header class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-inner">
      <img src="/app-icon.svg" alt="App Icon" class="app-logo-lg" onerror="this.style.display='none'">
      <div class="hero-title">
        <img src="/favicon.svg" alt="Mini Icon" class="app-logo-sm" onerror="this.style.display='none'">
        <h1>Page Not Found</h1>
      </div>
      <p class="subtitle">Oops! This page doesn’t exist.</p>
    </div>
  </header>

  <main class="container">
    <section class="card" style="text-align:center">
      <p>The page you’re looking for might have been moved or deleted.</p>
      <p><a href="/index.html" class="btn primary" style="margin-top:1rem;">Go Back Home</a></p>
    </section>
  </main>

  <footer class="footer">
    © 2025 The Daily BrainBolt •
    <a href="/index.html">Home</a> •
    <a href="/about.html">About</a> •
    <a href="/terms.html">Terms</a> •
    <a href="/privacy.html">Privacy</a> •
    <a href="/contact.html">Contact</a>
  </footer>

  <script>
    (() => {
      const btn = document.getElementById('mmMenuBtn');
      const panel = document.getElementById('mmSideMenu');
      const closeX = document.getElementById('mmCloseMenu');
      function openPanel(){ panel?.classList.add('open'); panel?.setAttribute('aria-hidden','false'); }
      function closePanel(){ panel?.classList.remove('open'); panel?.setAttribute('aria-hidden','true'); }
      btn?.addEventListener('click', openPanel);
      closeX?.addEventListener('click', closePanel);
      document.addEventListener('keydown', (e)=>{ if(e.key==='Escape') closePanel(); });
    })();
  </script>
</body>
</html>
