<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 • The Daily BrainBolt</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#0E1E27">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="topbar"><button id="mmMenuBtn" class="menu-btn" aria-label="Open menu">☰</button></div>
  <nav id="mmSideMenu" class="side-menu" aria-hidden="true">
    <button id="mmCloseMenu" class="close-btn" aria-label="Close menu">✕</button>
    <ul>
      <li><a href="/index.html">Home</a></li><li><a href="/about.html">About</a></li>
      <li><a href="/terms.html">Terms</a></li><li><a href="/privacy.html">Privacy</a></li>
      <li><a href="/contact.html">Contact</a></li>
    </ul>
  </nav>
  <header class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-inner">
      <div class="hero-title">
        <img src="/app-icon.svg" alt="BrainBolt Icon" class="app-icon-large" onerror="this.style.display='none'">
        <h1>Page Not Found</h1>
      </div>
      <p class="subtitle">Oops — that page doesn’t exist.</p>
    </div>
  </header>
  <main class="container">
    <section class="card" style="text-align:center">
      <p><a href="/index.html" class="btn primary">Return Home</a></p>
    </section>
  </main>
  <footer class="footer">© 2025 The Daily BrainBolt •
    <a href="/about.html">About</a> • <a href="/terms.html">Terms</a> •
    <a href="/privacy.html">Privacy</a> • <a href="/contact.html">Contact</a>
  </footer>
  <script>
    (()=>{const b=mmMenuBtn,p=mmSideMenu,x=mmCloseMenu;
    const o=()=>{p?.classList.add('open');p?.setAttribute('aria-hidden','false')};
    const c=()=>{p?.classList.remove('open');p?.setAttribute('aria-hidden','true')};
    b?.addEventListener('click',o);x?.addEventListener('click',c);document.addEventListener('keydown',e=>{if(e.key==='Escape')c();});})();
  </script>
</body>
</html>
