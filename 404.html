<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 • The Daily BrainBolt</title>

  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#0E1E27">

  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- Topbar -->
  <div class="topbar">
    <button id="mmMenuBtn" class="menu-btn" aria-label="Open menu">☰</button>
  </div>

  <!-- Side Menu -->
  <nav id="mmSideMenu" class="side-menu" aria-hidden="true">
    <button id="mmCloseMenu" class="close-btn" aria-label="Close menu">✕</button>
    <ul>
      <li><a href="/index.html">Home</a></li>
      <li><a href="/about.html">About</a></li>
      <li><a href="/terms.html">Terms</a></li>
      <li><a href="/privacy.html">Privacy</a></li>
      <li><a href="/contact.html">Contact</a></li>
      <li><button id="btnSignIn" class="btn outline">Sign in with Google</button></li>
      <li><button id="btnNotify" class="btn ghost">Enable Notifications</button></li>
    </ul>
  </nav>

  <!-- Hero -->
  <header class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-inner">
      <div class="hero-title">
        <img src="/app-icon.svg" alt="BrainBolt Icon" class="app-icon-large" onerror="this.style.display='none'">
        <h1>Page Not Found</h1>
      </div>
      <p class="subtitle">Looks like that page doesn’t exist.</p>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <p>Try going back to the <a href="/index.html">home page</a>, or use the menu to navigate elsewhere.</p>
    </section>
  </main>

  <footer class="footer">
    © 2025 The Daily BrainBolt •
    <a href="/about.html">About</a> •
    <a href="/terms.html">Terms</a> •
    <a href="/privacy.html">Privacy</a> •
    <a href="/contact.html">Contact</a>
  </footer>

  <script>
    (function initMenu(){
      const btn=document.getElementById('mmMenuBtn');
      const panel=document.getElementById('mmSideMenu');
      const closeBtn=document.getElementById('mmCloseMenu');
      const open=()=>{panel.classList.add('open');panel.setAttribute('aria-hidden','false');};
      const close=()=>{panel.classList.remove('open');panel.setAttribute('aria-hidden','true');};
      btn?.addEventListener('click',open);
      closeBtn?.addEventListener('click',close);
      document.addEventListener('keydown',e=>{if(e.key==='Escape')close();});
    })();
  </script>
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load',()=>{navigator.serviceWorker.register('/service-worker.js').catch(()=>{});});
    }
  </script>
</body>
</html>
