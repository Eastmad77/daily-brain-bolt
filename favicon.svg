<!-- /public/favicon.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <!-- Bolt fill: neon blue gradient -->
    <linearGradient id="boltFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#38FFF9"/>
      <stop offset="100%" stop-color="#4AC9FF"/>
    </linearGradient>

    <!-- Dark blue sphere glow -->
    <radialGradient id="sphere" cx="50%" cy="50%" r="60%">
      <stop offset="0%"  stop-color="#0D2E3F" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#093042" stop-opacity="0.70"/>
      <stop offset="100%" stop-color="#061923" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- deep background panel -->
  <rect width="256" height="256" rx="56" fill="#0D2430"/>

  <!-- dark blue aura -->
  <circle cx="128" cy="128" r="110" fill="url(#sphere)"/>

  <!-- lightning bolt: blue fill + orange outline -->
  <path d="M150 38 L94 128 L142 128 L112 218 L190 122 L140 122 Z"
        fill="url(#boltFill)"
        stroke="#FF8C00"
        stroke-width="6"
        style="filter: drop-shadow(0 8px 14px rgba(255,140,0,.35))
                        drop-shadow(0 14px 28px rgba(56,255,249,.25));"/>
</svg>
