<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BrainBolt Pro • Categories & Difficulty</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" sizes="192x192" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#0E1E27">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="topbar"><button id="mmMenuBtn" class="menu-btn" aria-label="Open menu">☰</button></div>
  <nav id="mmSideMenu" class="side-menu" aria-hidden="true">
    <ul>
      <li><a href="/index.html">Home</a></li><li><a href="/menu.html">Menu</a></li>
      <li><a href="/about.html">About</a></li><li><a href="/terms.html">Terms</a></li>
      <li><a href="/privacy.html">Privacy</a></li><li><a href="/contact.html">Contact</a></li>
    </ul>
  </nav>

  <header class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-inner">
      <div class="hero-title">
        <img src="/app-icon.svg" alt="BrainBolt Icon" class="app-icon-large">
        <h1>BrainBolt Pro</h1>
      </div>
      <p class="subtitle">Pick categories & difficulty</p>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <form id="proForm" style="display:grid;gap:12px;">
        <div>
          <label><strong>Categories</strong></label>
          <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem">
            <label><input type="checkbox" name="cat" value="World Trivia" checked> World</label>
            <label><input type="checkbox" name="cat" value="Language" checked> Language</label>
            <label><input type="checkbox" name="cat" value="Logic Puzzle" checked> Logic</label>
          </div>
        </div>
        <div>
          <label><strong>Difficulty</strong></label>
          <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.5rem">
            <label><input type="checkbox" name="diff" value="Easy" checked> Easy</label>
            <label><input type="checkbox" name="diff" value="Medium" checked> Medium</label>
            <label><input type="checkbox" name="diff" value="Hard"> Hard</label>
            <label><input type="checkbox" name="diff" value="Expert"> Expert</label>
          </div>
        </div>
        <button class="btn primary" type="submit">Build a Pro Set</button>
      </form>
    </section>
  </main>

  <footer class="footer">© 2025 The Daily BrainBolt •
    <a href="/about.html">About</a> • <a href="/terms.html">Terms</a> •
    <a href="/privacy.html">Privacy</a> • <a href="/contact.html">Contact</a>
  </footer>

  <script>
    (()=>{const b=mmMenuBtn,p=mmSideMenu;let t;
      const cls=()=>{p.classList.remove('open');p.setAttribute('aria-hidden','true');clearTimeout(t);};
      const opn=()=>{p.classList.add('open');p.setAttribute('aria-hidden','false');clearTimeout(t);t=setTimeout(cls,5000);};
      b?.addEventListener('click',opn);p.addEventListener('mouseenter',()=>clearTimeout(t));p.addEventListener('mouseleave',()=>{clearTimeout(t);t=setTimeout(cls,5000);});
      p.querySelectorAll('a,button').forEach(el=>el.addEventListener('click',cls));
      document.addEventListener('keydown',e=>{if(e.key==='Escape')cls();});
    })();

    // Stub: for now, just store the selection and redirect home (you’ll wire this to your data later)
    document.getElementById('proForm')?.addEventListener('submit', (e)=>{
      e.preventDefault();
      const cats=[...document.querySelectorAll('input[name="cat"]:checked')].map(i=>i.value);
      const diffs=[...document.querySelectorAll('input[name="diff"]:checked')].map(i=>i.value);
      localStorage.setItem('proCats', JSON.stringify(cats));
      localStorage.setItem('proDiffs', JSON.stringify(diffs));
      alert('Pro set saved. (Hook to data source next.)');
      location.href='/index.html';
    });
  </script>
</body>
</html>
