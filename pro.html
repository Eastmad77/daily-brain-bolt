<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BrainBolt Pro • Build Your Set</title>

  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" sizes="192x192" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#0E1E27">

  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="topbar">
    <button id="mmMenuBtn" class="menu-btn" aria-label="Open menu">☰</button>
  </div>

  <nav id="mmSideMenu" class="side-menu" aria-hidden="true">
    <ul>
      <li><a href="/index.html">Home</a></li>
      <li><a href="/menu.html">Menu</a></li>
      <li><a href="/about.html">About</a></li>
      <li><a href="/terms.html">Terms</a></li>
      <li><a href="/privacy.html">Privacy</a></li>
      <li><a href="/contact.html">Contact</a></li>
    </ul>
  </nav>

  <header class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-inner">
      <div class="hero-title">
        <img src="/app-icon.svg" alt="BrainBolt Icon" class="app-icon-large">
        <h1>BrainBolt Pro</h1>
      </div>
      <p class="subtitle">Pick categories & difficulty to build a custom 12-question set.</p>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <form id="proForm" style="display:grid;gap:16px;">
        <div>
          <label><strong>Categories</strong></label>
          <div style="display:flex;gap:.75rem;flex-wrap:wrap;margin-top:.5rem">
            <label><input type="checkbox" name="cat" value="World Trivia" checked> World Trivia</label>
            <label><input type="checkbox" name="cat" value="Language" checked> Language</label>
            <label><input type="checkbox" name="cat" value="Logic Puzzle" checked> Logic Puzzle</label>
            <!-- Add more if you add more categories to pro_bank -->
          </div>
        </div>

        <div>
          <label><strong>Difficulty</strong></label>
          <div style="display:flex;gap:.75rem;flex-wrap:wrap;margin-top:.5rem">
            <label><input type="checkbox" name="diff" value="Easy" checked> Easy</label>
            <label><input type="checkbox" name="diff" value="Medium" checked> Medium</label>
            <label><input type="checkbox" name="diff" value="Hard"> Hard</label>
            <label><input type="checkbox" name="diff" value="Expert"> Expert</label>
          </div>
        </div>

        <div style="display:flex;gap:.75rem;flex-wrap:wrap">
          <button class="btn primary" type="submit">Build My Pro Set</button>
          <button id="clearPro" class="btn outline" type="button">Clear Pro Mode</button>
        </div>
      </form>

      <p id="proHint" class="feedback" style="margin-top:.5rem">
        Pro mode uses the <code>pro_bank</code> tab in your Google Sheet.
      </p>
    </section>
  </main>

  <footer class="footer">© 2025 The Daily BrainBolt •
    <a href="/about.html">About</a> • <a href="/terms.html">Terms</a> •
    <a href="/privacy.html">Privacy</a> • <a href="/contact.html">Contact</a>
  </footer>

  <script>
    // slide-out menu with auto-hide
    (function initMenu(){
      const btn=document.getElementById('mmMenuBtn');
      const panel=document.getElementById('mmSideMenu');
      let hideTimer=null;
      const close=()=>{panel.classList.remove('open');panel.setAttribute('aria-hidden','true');clearTimeout(hideTimer);};
      const open =()=>{panel.classList.add('open');panel.setAttribute('aria-hidden','false');restartAutoHide();};
      function restartAutoHide(){clearTimeout(hideTimer);hideTimer=setTimeout(close,5000);}
      btn?.addEventListener('click',open);
      panel.addEventListener('mouseenter',()=>clearTimeout(hideTimer));
      panel.addEventListener('mouseleave',()=>{restartAutoHide();});
      panel.querySelectorAll('a,button').forEach(el=>el.addEventListener('click',close));
      document.addEventListener('keydown',e=>{if(e.key==='Escape')close();});
    })();

    // Pro form behavior
    document.getElementById('proForm')?.addEventListener('submit', (e)=>{
      e.preventDefault();
      const cats=[...document.querySelectorAll('input[name="cat"]:checked')].map(i=>i.value);
      const diffs=[...document.querySelectorAll('input[name="diff"]:checked')].map(i=>i.value);
      if (!cats.length || !diffs.length) { alert('Pick at least one category and one difficulty.'); return; }
      localStorage.setItem('proFilters', JSON.stringify({cats, diffs}));
      // Go to home; app.js will detect and build Pro set from pro_bank
      location.href='/index.html';
    });

    document.getElementById('clearPro')?.addEventListener('click', ()=>{
      localStorage.removeItem('proFilters');
      alert('Pro mode cleared.');
    });
  </script>
</body>
</html>
